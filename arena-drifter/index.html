<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OVERSTEER</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
canvas {
  display: block;
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  image-rendering: pixelated;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ============================================================
// OVERSTEER — Top-Down Arena Drifter
// Single-file implementation
// ============================================================

// ── 1. CONFIG ───────────────────────────────────────────────
const CFG = {
  W: 960, H: 540,
  // Physics
  ACCEL: 900,
  MAX_SPEED: 520,
  REVERSE_ACCEL: 600,
  REVERSE_MAX: 240,
  TURN_RATE: 240 * Math.PI / 180, // rad/sec
  TURN_REDUCE_AT_MAX: 0.45,
  LATERAL_FRICTION: 8.5,
  FORWARD_DRAG: 1.7,
  DRIFT_LATERAL: 3.2,
  DRIFT_DRAG: 2.1,
  DRIFT_THRESHOLD: 180,
  DRIFT_BOOST: 60,
  ARENA_PAD: 24,
  BOUNCE_RETAIN: 0.35,
  // Player
  PLAYER_W: 34, PLAYER_H: 18,
  PLAYER_RADIUS: 10,
  PLAYER_DRIFT_SHRINK: 2,
  // Enemies
  CHASER_SPEED: 420,
  INTERCEPTOR_SPEED: 460,
  DRIFTER_SPEED: 440,
  ENEMY_RADIUS: 9,
  ENEMY_W: 32, ENEMY_H: 16,
  ENEMY_ACCEL: 700,
  ENEMY_TURN_RATE: 200 * Math.PI / 180,
  // Near-miss
  NEAR_MISS_ENEMY: 8,
  NEAR_MISS_HAZARD: 10,
  NEAR_MISS_COOLDOWN: 1.2,
  // Scoring
  SCORE_PER_SEC: 4,
  NEAR_MISS_ENEMY_PTS: 25,
  NEAR_MISS_HAZARD_PTS: 15,
  DRIFT_COMBO_INTERVAL: 1.0,
  DRIFT_COMBO_BASE: 5,
  MAX_COMBO: 8,
  // Waves
  WAVE_COMBAT: 25,
  WAVE_BREAK: 8,
  FIRST_SPAWN: 0.8,
  SPAWN_INTERVAL: 2.2,
  BURST_INTERVAL: 8,
  BURST_COUNT: 2,
  BURST_DELAY: 0.3,
  // Hazards
  HAZARD_RADIUS: 14,
  BARRIER_RADIUS: 10,
  OIL_SLIP_DURATION: 1.2,
  OIL_SLIP_FRICTION: 2.2,
  // Scrap
  SCRAP_INTERVAL: 6,
  SCRAP_RADIUS: 7,
  SCRAP_NEAR_MISS_CHANCE: 0.35,
  // Upgrades
  UPGRADES_TO_OFFER: 3,
  UPGRADE_BREAK_TIME: 8,
  // Colors
  C_BG: '#07080B',
  C_BG2: '#0E1118',
  C_PANEL: '#1A2233',
  C_TEXT: '#EAEFF7',
  C_PLAYER: '#EAEFF7',
  C_ACCENT: '#35F2D0',
  C_ENEMY: '#FF3B6B',
  C_ENEMY_DARK: '#7A1B33',
  C_PICKUP: '#FFB000',
  C_RARE: '#7C5CFF',
  C_SHIELD: '#5BFF4A',
  C_OBSTACLE: '#6B7280',
  // Death
  FREEZE_TIME: 0.10,
  DEATH_SLOWMO: 0.35,
  DEATH_SLOWMO_DUR: 0.35,
  SHARD_COUNT_MIN: 10,
  SHARD_COUNT_MAX: 14,
  // Shield
  SHIELD_KNOCKBACK: 140,
  SHIELD_INVULN: 1.0,
  // Open World
  WORLD_W: 3000, WORLD_H: 3000,
  // Enemy lifespan
  ENEMY_LIFESPAN_MIN: 10, ENEMY_LIFESPAN_MAX: 18,
  ENEMY_OFFSCREEN_BOOST: 1.5,
  ENEMY_OFFSCREEN_DESPAWN: 5,
  ENEMY_FAR_DESPAWN_DIST: 1200,
  // Early-game balancing
  FIRST_SPAWN_INITIAL: 2.5,
  SPAWN_INTERVAL_INITIAL: 4.0,
  FIRST_SPAWN_MIN: 0.6,
  SPAWN_INTERVAL_MIN: 1.5,
  WAVE_COMBAT_WAVE1: 30,
};

// ── 2. UTILS ────────────────────────────────────────────────
const U = {
  lerp(a, b, t) { return a + (b - a) * t; },
  clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); },
  randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; },
  randFloat(a, b) { return Math.random() * (b - a) + a; },
  randChoice(arr) { return arr[Math.floor(Math.random() * arr.length)]; },
  randSample(arr, n) {
    const c = arr.slice(), o = [];
    for (let i = 0; i < n && c.length; i++) {
      const idx = Math.floor(Math.random() * c.length);
      o.push(c.splice(idx, 1)[0]);
    }
    return o;
  },
  approach(cur, tgt, step) {
    if (cur < tgt) return Math.min(cur + step, tgt);
    if (cur > tgt) return Math.max(cur - step, tgt);
    return tgt;
  },
  normalizeAngle(a) {
    while (a > Math.PI) a -= 2 * Math.PI;
    while (a < -Math.PI) a += 2 * Math.PI;
    return a;
  },
  angleLerp(a, b, t) {
    return a + U.normalizeAngle(b - a) * t;
  },
  angleDiff(a, b) {
    return U.normalizeAngle(b - a);
  },
  vec2FromAngle(a) { return { x: Math.cos(a), y: Math.sin(a) }; },
  dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); },
  drawRotatedRect(ctx, cx, cy, w, h, angle, fill, stroke) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    if (fill) { ctx.fillStyle = fill; ctx.fillRect(-w/2, -h/2, w, h); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 1.5; ctx.strokeRect(-w/2, -h/2, w, h); }
    ctx.restore();
  },
  roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  },
  text(ctx, str, x, y, opts = {}) {
    const { color = '#fff', size = 18, align = 'left', shadow = false, bold = false } = opts;
    ctx.font = `${bold ? 'bold ' : ''}${size}px 'Courier New', monospace`;
    ctx.textAlign = align;
    ctx.textBaseline = 'middle';
    if (shadow) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillText(str, x + 2, y + 2);
    }
    ctx.fillStyle = color;
    ctx.fillText(str, x, y);
  },
  wrapText(ctx, text, x, y, maxW, lineH, opts = {}) {
    ctx.font = `${opts.size || 13}px 'Courier New', monospace`;
    ctx.textAlign = opts.align || 'left';
    ctx.textBaseline = 'top';
    ctx.fillStyle = opts.color || '#fff';
    const words = text.split(' ');
    let line = '', ly = y;
    for (const w of words) {
      const test = line + (line ? ' ' : '') + w;
      if (ctx.measureText(test).width > maxW && line) {
        ctx.fillText(line, x, ly);
        line = w; ly += lineH;
      } else line = test;
    }
    if (line) ctx.fillText(line, x, ly);
  },
};

// ── 3. INPUT ────────────────────────────────────────────────
const Input = {
  keys: {},
  up: false, down: false, left: false, right: false,
  drift: false, pause: false, enter: false,
  _pausePressed: false, _enterPressed: false,
  // Touch state
  touch: { active: false, stickId: null, stickOrigin: null, stickPos: null, driftId: null, pauseTap: false },

  init() {
    document.addEventListener('keydown', e => {
      Input.keys[e.code] = true;
      e.preventDefault();
    });
    document.addEventListener('keyup', e => {
      Input.keys[e.code] = false;
    });
    // Touch controls
    const cv = document.getElementById('c');
    cv.addEventListener('touchstart', e => { e.preventDefault(); Input._touchStart(e); }, { passive: false });
    cv.addEventListener('touchmove', e => { e.preventDefault(); Input._touchMove(e); }, { passive: false });
    cv.addEventListener('touchend', e => { e.preventDefault(); Input._touchEnd(e); }, { passive: false });
    cv.addEventListener('touchcancel', e => { e.preventDefault(); Input._touchEnd(e); }, { passive: false });
  },

  _getTouchPos(t) {
    const cv = document.getElementById('c');
    const r = cv.getBoundingClientRect();
    return {
      x: (t.clientX - r.left) / r.width * CFG.W,
      y: (t.clientY - r.top) / r.height * CFG.H
    };
  },

  _touchStart(e) {
    const t = this.touch;
    // Two-finger = pause
    if (e.touches.length >= 2) { t.pauseTap = true; return; }
    for (const touch of e.changedTouches) {
      const p = this._getTouchPos(touch);
      if (p.x < CFG.W / 2) {
        // Left side = stick
        t.active = true;
        t.stickId = touch.identifier;
        t.stickOrigin = { x: p.x, y: p.y };
        t.stickPos = { x: p.x, y: p.y };
      } else {
        // Right side = drift
        t.driftId = touch.identifier;
      }
    }
  },

  _touchMove(e) {
    const t = this.touch;
    for (const touch of e.changedTouches) {
      if (touch.identifier === t.stickId) {
        t.stickPos = this._getTouchPos(touch);
      }
    }
  },

  _touchEnd(e) {
    const t = this.touch;
    for (const touch of e.changedTouches) {
      if (touch.identifier === t.stickId) {
        t.stickId = null; t.stickOrigin = null; t.stickPos = null; t.active = false;
      }
      if (touch.identifier === t.driftId) {
        t.driftId = null;
      }
    }
  },

  poll() {
    const k = this.keys;
    this.up = !!(k['ArrowUp'] || k['KeyW']);
    this.down = !!(k['ArrowDown'] || k['KeyS']);
    this.left = !!(k['ArrowLeft'] || k['KeyA']);
    this.right = !!(k['ArrowRight'] || k['KeyD']);
    this.drift = !!k['Space'];

    // Touch stick
    const t = this.touch;
    if (t.stickOrigin && t.stickPos) {
      const dx = t.stickPos.x - t.stickOrigin.x;
      const dy = t.stickPos.y - t.stickOrigin.y;
      const mag = Math.hypot(dx, dy);
      if (mag > 15) {
        const angle = Math.atan2(dy, dx);
        this.up = this.up || dy < -15;
        this.down = this.down || dy > 15;
        this.left = this.left || dx < -15;
        this.right = this.right || dx > 15;
      }
    }
    if (t.driftId !== null) this.drift = true;

    // Edge-triggered pause
    const pNow = !!(k['KeyP'] || k['Escape']);
    this.pause = pNow && !this._pausePressed;
    this._pausePressed = pNow;

    // Edge-triggered enter
    const eNow = !!k['Enter'];
    this.enter = eNow && !this._enterPressed;
    this._enterPressed = eNow;

    // Touch pause
    if (t.pauseTap) { this.pause = true; t.pauseTap = false; }
  },
};

// ── 4. SHARED PHYSICS ENGINE ────────────────────────────────
function updatePhysics(ent, dt, turnInput, throttle, braking, wantDrift, isPlayer) {
  const speed = Math.hypot(ent.vx, ent.vy);

  // Drift activation
  if (wantDrift && speed >= CFG.DRIFT_THRESHOLD) {
    if (!ent.drifting) {
      ent.drifting = true;
      ent.driftJustStarted = true;
      // Boost impulse
      const dir = U.vec2FromAngle(ent.heading);
      ent.vx += dir.x * CFG.DRIFT_BOOST;
      ent.vy += dir.y * CFG.DRIFT_BOOST;
    }
  } else {
    ent.drifting = false;
  }

  // Turn rate (reduced at high speed)
  const speedFrac = U.clamp(speed / (ent.maxSpeed || CFG.MAX_SPEED), 0, 1);
  const turnMult = 1 - speedFrac * CFG.TURN_REDUCE_AT_MAX;
  const turnRate = (ent.turnRate || CFG.TURN_RATE) * turnMult;
  ent.heading += turnInput * turnRate * dt;
  ent.heading = U.normalizeAngle(ent.heading);

  // Acceleration
  const fwd = U.vec2FromAngle(ent.heading);
  if (throttle) {
    ent.vx += fwd.x * CFG.ACCEL * dt;
    ent.vy += fwd.y * CFG.ACCEL * dt;
  }
  if (braking) {
    // If moving forward, brake; if slow, reverse
    const dot = ent.vx * fwd.x + ent.vy * fwd.y;
    if (dot > 30) {
      // Brake
      ent.vx -= fwd.x * CFG.ACCEL * 1.5 * dt;
      ent.vy -= fwd.y * CFG.ACCEL * 1.5 * dt;
    } else {
      // Reverse
      ent.vx -= fwd.x * CFG.REVERSE_ACCEL * dt;
      ent.vy -= fwd.y * CFG.REVERSE_ACCEL * dt;
    }
  }

  // Decompose velocity into forward and lateral
  const dot = ent.vx * fwd.x + ent.vy * fwd.y;
  const latX = ent.vx - fwd.x * dot;
  const latY = ent.vy - fwd.y * dot;

  // Apply friction
  const latFric = ent.drifting ? CFG.DRIFT_LATERAL : CFG.LATERAL_FRICTION;
  const fwdDrag = ent.drifting ? CFG.DRIFT_DRAG : CFG.FORWARD_DRAG;

  // Oil slip override
  const effectiveLatFric = (ent.slipTimer > 0) ? Math.min(latFric, CFG.OIL_SLIP_FRICTION) : latFric;

  const latDecay = Math.exp(-effectiveLatFric * dt);
  const fwdDecay = Math.exp(-fwdDrag * dt);

  ent.vx = fwd.x * dot * fwdDecay + latX * latDecay;
  ent.vy = fwd.y * dot * fwdDecay + latY * latDecay;

  // Clamp speed
  const newSpeed = Math.hypot(ent.vx, ent.vy);
  const maxSpd = braking && !throttle ? CFG.REVERSE_MAX : (ent.maxSpeed || CFG.MAX_SPEED);
  if (newSpeed > maxSpd) {
    const s = maxSpd / newSpeed;
    ent.vx *= s; ent.vy *= s;
  }

  // Move
  ent.x += ent.vx * dt;
  ent.y += ent.vy * dt;

  // Arena bounds (world-sized)
  const pad = CFG.ARENA_PAD;
  if (ent.x < pad) { ent.x = pad; ent.vx = Math.abs(ent.vx) * CFG.BOUNCE_RETAIN; ent.wallHit = true; }
  if (ent.x > CFG.WORLD_W - pad) { ent.x = CFG.WORLD_W - pad; ent.vx = -Math.abs(ent.vx) * CFG.BOUNCE_RETAIN; ent.wallHit = true; }
  if (ent.y < pad) { ent.y = pad; ent.vy = Math.abs(ent.vy) * CFG.BOUNCE_RETAIN; ent.wallHit = true; }
  if (ent.y > CFG.WORLD_H - pad) { ent.y = CFG.WORLD_H - pad; ent.vy = -Math.abs(ent.vy) * CFG.BOUNCE_RETAIN; ent.wallHit = true; }

  // Slip timer
  if (ent.slipTimer > 0) ent.slipTimer -= dt;
}

// ── 5. PLAYER ───────────────────────────────────────────────
class Player {
  constructor() { this.reset(); }

  reset() {
    this.x = CFG.WORLD_W / 2;
    this.y = CFG.WORLD_H / 2;
    this.vx = 0; this.vy = 0;
    this.heading = -Math.PI / 2; // facing up
    this.drifting = false;
    this.driftJustStarted = false;
    this.maxSpeed = CFG.MAX_SPEED;
    this.turnRate = CFG.TURN_RATE;
    this.shield = false;
    this.invulnTimer = 0;
    this.slipTimer = 0;
    this.wallHit = false;
    this.upgrades = [];
    this.comboLevel = 0;
    this.driftTime = 0;
    this.leanTimer = 0;
    this.leanDir = 0;
    this.exhaustTimer = 0;
    this.braking = false;
    this.glowPhase = 0;
    this.driftDeniedTimer = 0;
    // Upgrade flags
    this.tightTurns = false;
    this.driftKing = false;
    this.magnetRange = 0;
    this.scoreMult = 1;
    this.ghostFrameTimer = 0;
    this.thickPlating = false;
    this.afterburner = false;
    this.comboMaster = false;
    this.oilResistant = false;
    this.speedDemon = false;
    this.encircleScoreBonus = 1;
  }

  get speed() { return Math.hypot(this.vx, this.vy); }
  get radius() { return CFG.PLAYER_RADIUS - (this.drifting ? CFG.PLAYER_DRIFT_SHRINK : 0); }

  update(dt) {
    // Turn input
    let turnInput = 0;
    if (Input.left) turnInput -= 1;
    if (Input.right) turnInput += 1;

    // Lean FX
    if (turnInput !== 0) { this.leanTimer = 0.08; this.leanDir = turnInput; }
    if (this.leanTimer > 0) this.leanTimer -= dt;

    // Exhaust FX
    if (Input.up) this.exhaustTimer = 0.06;
    if (this.exhaustTimer > 0) this.exhaustTimer -= dt;

    this.braking = Input.down;

    // Drift denied FX
    if (Input.drift && this.speed < CFG.DRIFT_THRESHOLD && !this.drifting) {
      this.driftDeniedTimer = 0.12;
    }
    if (this.driftDeniedTimer > 0) this.driftDeniedTimer -= dt;

    // Tight turns upgrade
    const origTurn = this.turnRate;
    if (this.tightTurns) this.turnRate = CFG.TURN_RATE * 1.25;

    this.wallHit = false;
    this.driftJustStarted = false;
    updatePhysics(this, dt, turnInput, Input.up, Input.down, Input.drift, true);

    this.turnRate = origTurn;

    // Drift time tracking
    if (this.drifting) {
      this.driftTime += dt;
    } else {
      this.driftTime = 0;
      this.comboLevel = Math.max(0, this.comboLevel - dt * 2);
    }

    // Invulnerability
    if (this.invulnTimer > 0) this.invulnTimer -= dt;
    if (this.ghostFrameTimer > 0) this.ghostFrameTimer -= dt;

    // Glow
    this.glowPhase += dt;
  }

  render(ctx) {
    const speed = this.speed;
    const drifting = this.drifting;

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.heading);

    // Invulnerability blink
    if (this.invulnTimer > 0 && Math.floor(this.invulnTimer * 10) % 2 === 0) {
      ctx.globalAlpha = 0.4;
    }

    // Lean effect
    let sx = 1, sy = 1;
    if (this.leanTimer > 0) {
      sx = 1.03; sy = 0.97;
    }
    ctx.scale(sx, sy);

    // Underglow
    const glowPulse = 0.3 + 0.15 * Math.sin(this.glowPhase * 2 * Math.PI / 1.2);
    ctx.shadowColor = CFG.C_ACCENT;
    ctx.shadowBlur = drifting ? 18 : 10;
    ctx.globalAlpha *= (0.6 + glowPulse);

    // Body
    ctx.fillStyle = CFG.C_PLAYER;
    ctx.fillRect(-CFG.PLAYER_W/2, -CFG.PLAYER_H/2, CFG.PLAYER_W, CFG.PLAYER_H);

    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;

    // Outline
    ctx.strokeStyle = drifting ? CFG.C_ACCENT : '#888';
    ctx.lineWidth = drifting ? 2 : 1;
    ctx.strokeRect(-CFG.PLAYER_W/2, -CFG.PLAYER_H/2, CFG.PLAYER_W, CFG.PLAYER_H);

    // Windshield
    ctx.fillStyle = '#8AF';
    ctx.fillRect(CFG.PLAYER_W/2 - 8, -CFG.PLAYER_H/2 + 3, 5, CFG.PLAYER_H - 6);

    // Nose highlight
    ctx.fillStyle = CFG.C_ACCENT;
    ctx.beginPath();
    ctx.moveTo(CFG.PLAYER_W/2, 0);
    ctx.lineTo(CFG.PLAYER_W/2 - 6, -5);
    ctx.lineTo(CFG.PLAYER_W/2 - 6, 5);
    ctx.closePath();
    ctx.fill();

    // Rear lights
    ctx.fillStyle = this.braking ? '#FF4444' : '#AA2222';
    ctx.fillRect(-CFG.PLAYER_W/2, -CFG.PLAYER_H/2 + 2, 3, 3);
    ctx.fillRect(-CFG.PLAYER_W/2, CFG.PLAYER_H/2 - 5, 3, 3);

    // Exhaust flare
    if (this.exhaustTimer > 0) {
      ctx.fillStyle = CFG.C_PICKUP;
      ctx.globalAlpha = this.exhaustTimer / 0.06;
      ctx.beginPath();
      ctx.moveTo(-CFG.PLAYER_W/2, 0);
      ctx.lineTo(-CFG.PLAYER_W/2 - 12, -4);
      ctx.lineTo(-CFG.PLAYER_W/2 - 12, 4);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Drift denied flash
    if (this.driftDeniedTimer > 0) {
      ctx.strokeStyle = CFG.C_PICKUP;
      ctx.lineWidth = 3;
      ctx.globalAlpha = this.driftDeniedTimer / 0.12;
      ctx.strokeRect(-CFG.PLAYER_W/2 - 2, -CFG.PLAYER_H/2 - 2, CFG.PLAYER_W + 4, CFG.PLAYER_H + 4);
      ctx.globalAlpha = 1;
    }

    // Shield indicator
    if (this.shield) {
      ctx.strokeStyle = CFG.C_SHIELD;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.5 + 0.3 * Math.sin(this.glowPhase * 4);
      ctx.beginPath();
      ctx.arc(0, 0, CFG.PLAYER_RADIUS + 6, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    ctx.restore();

    // Engine jitter (idle life)
    if (speed < 30) {
      // tiny jitter handled by glow pulse already
    }
  }
}

// ── 6. ENEMIES ──────────────────────────────────────────────
class Enemy {
  constructor(type, x, y) {
    this.type = type; // 'chaser', 'interceptor', 'drifter'
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    this.heading = 0;
    this.drifting = false;
    this.driftJustStarted = false;
    this.slipTimer = 0;
    this.wallHit = false;
    this.alive = true;
    this.nearMissCooldown = 0;
    this.offscreenTimer = 0;
    this.driftToggleTimer = U.randFloat(2, 5);
    this.glowExtra = 0;
    this.age = 0;
    this.lifespan = U.randFloat(CFG.ENEMY_LIFESPAN_MIN, CFG.ENEMY_LIFESPAN_MAX);
    this.fadeAlpha = 1;
    this.baseMaxSpeed = 0; // set after maxSpeed is assigned

    if (type === 'chaser') { this.maxSpeed = CFG.CHASER_SPEED; this.turnRate = CFG.ENEMY_TURN_RATE; }
    else if (type === 'interceptor') { this.maxSpeed = CFG.INTERCEPTOR_SPEED; this.turnRate = CFG.ENEMY_TURN_RATE * 0.85; }
    else { this.maxSpeed = CFG.DRIFTER_SPEED; this.turnRate = CFG.ENEMY_TURN_RATE * 1.1; }
    this.baseMaxSpeed = this.maxSpeed;
  }

  update(dt, player) {
    if (!this.alive) return;

    // Target
    let tx = player.x, ty = player.y;
    if (this.type === 'interceptor') {
      // Lead the player
      const lookAhead = 0.5;
      tx += player.vx * lookAhead;
      ty += player.vy * lookAhead;
    }

    // Desired heading
    const desired = Math.atan2(ty - this.y, tx - this.x);
    const diff = U.angleDiff(this.heading, desired);
    let turnInput = U.clamp(diff * 3, -1, 1);

    // Drifter type: periodic drift toggles
    let wantDrift = false;
    if (this.type === 'drifter') {
      this.driftToggleTimer -= dt;
      if (this.driftToggleTimer <= 0) {
        this.driftToggleTimer = U.randFloat(1.5, 4);
        wantDrift = true;
      }
      if (this.drifting) wantDrift = true;
      // Release drift after a while
      if (this.drifting && this.driftToggleTimer > 2) wantDrift = false;
    }

    this.wallHit = false;
    this.driftJustStarted = false;
    updatePhysics(this, dt, turnInput, true, false, wantDrift, false);

    // Near miss cooldown
    if (this.nearMissCooldown > 0) this.nearMissCooldown -= dt;

    // Age / lifespan
    this.age += dt;
    if (this.age >= this.lifespan) {
      this.alive = false;
      // Fade-out poof particles
      Particles.spawn(this.x, this.y, '#666', 6, {
        vxMin: -60, vxMax: 60, vyMin: -60, vyMax: 60,
        lifeMin: 0.3, lifeMax: 0.5, sizeMin: 3, sizeMax: 6, type: 'smoke',
      });
      return;
    }
    // Fade alpha when nearing end of lifespan (last 2 seconds)
    this.fadeAlpha = this.lifespan - this.age < 2 ? (this.lifespan - this.age) / 2 : 1;

    // Off-screen behavior: boost speed for catch-up, despawn if too far/too long
    const onScreen = Camera.isVisible(this.x, this.y, 40);
    if (!onScreen) {
      this.offscreenTimer += dt;
      this.maxSpeed = this.baseMaxSpeed * CFG.ENEMY_OFFSCREEN_BOOST;
      if (this.offscreenTimer > CFG.ENEMY_OFFSCREEN_DESPAWN) { this.alive = false; return; }
      if (U.dist(this.x, this.y, player.x, player.y) > CFG.ENEMY_FAR_DESPAWN_DIST) { this.alive = false; return; }
    } else {
      this.offscreenTimer = 0;
      this.maxSpeed = this.baseMaxSpeed;
    }
  }

  render(ctx, time) {
    if (!this.alive) return;

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.heading);

    // Fade when nearing lifespan end
    if (this.fadeAlpha !== undefined && this.fadeAlpha < 1) {
      ctx.globalAlpha = Math.max(0.15, this.fadeAlpha);
    }

    // Danger aura
    ctx.shadowColor = CFG.C_ENEMY;
    ctx.shadowBlur = 12 + this.glowExtra;

    // Body
    ctx.fillStyle = CFG.C_ENEMY_DARK;
    ctx.fillRect(-CFG.ENEMY_W/2, -CFG.ENEMY_H/2, CFG.ENEMY_W, CFG.ENEMY_H);
    ctx.strokeStyle = CFG.C_ENEMY;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(-CFG.ENEMY_W/2, -CFG.ENEMY_H/2, CFG.ENEMY_W, CFG.ENEMY_H);

    ctx.shadowBlur = 0;

    // Headlight wedge
    ctx.fillStyle = CFG.C_TEXT;
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.moveTo(CFG.ENEMY_W/2, -2);
    ctx.lineTo(CFG.ENEMY_W/2 + 10, -8);
    ctx.lineTo(CFG.ENEMY_W/2 + 10, 8);
    ctx.lineTo(CFG.ENEMY_W/2, 2);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.restore();
  }
}

// ── 7. ARENA / OBSTACLES ────────────────────────────────────
class Obstacle {
  constructor(type, x, y, angle) {
    this.type = type; // 'barrier', 'cones', 'oil'
    this.x = x; this.y = y;
    this.angle = angle || 0;
    this.nearMissCooldown = 0;

    if (type === 'barrier') {
      this.w = 60; this.h = 20;
      // Two circle collision points at ends
      this.circles = [
        { ox: -20, oy: 0, r: CFG.BARRIER_RADIUS },
        { ox: 20, oy: 0, r: CFG.BARRIER_RADIUS },
      ];
    } else if (type === 'cones') {
      this.r = CFG.HAZARD_RADIUS;
      this.circles = [{ ox: 0, oy: 0, r: CFG.HAZARD_RADIUS }];
    } else {
      // Oil
      this.w = 70; this.h = 50;
      this.circles = []; // no collision, apply slip
    }
  }

  getWorldCircles() {
    if (!this.circles) return [];
    const cos = Math.cos(this.angle), sin = Math.sin(this.angle);
    return this.circles.map(c => ({
      x: this.x + c.ox * cos - c.oy * sin,
      y: this.y + c.ox * sin + c.oy * cos,
      r: c.r,
    }));
  }

  render(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);

    if (this.type === 'barrier') {
      ctx.fillStyle = CFG.C_OBSTACLE;
      ctx.fillRect(-30, -10, 60, 20);
      ctx.strokeStyle = CFG.C_PANEL;
      ctx.lineWidth = 1;
      ctx.strokeRect(-30, -10, 60, 20);
      // Hazard stripes
      ctx.fillStyle = '#555';
      for (let i = -25; i < 25; i += 12) {
        ctx.fillRect(i, -8, 6, 16);
      }
    } else if (this.type === 'cones') {
      // Three cones in triangle
      ctx.fillStyle = CFG.C_OBSTACLE;
      for (const [cx, cy] of [[0, -8], [-7, 6], [7, 6]]) {
        ctx.beginPath();
        ctx.moveTo(cx, cy - 6);
        ctx.lineTo(cx - 4, cy + 4);
        ctx.lineTo(cx + 4, cy + 4);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = CFG.C_PICKUP;
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    } else {
      // Oil slick
      ctx.fillStyle = '#0B0F19';
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      ctx.ellipse(0, 0, 35, 25, 0, 0, Math.PI * 2);
      ctx.fill();
      // Glossy highlight
      ctx.fillStyle = '#1A2233';
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.ellipse(-5, -5, 15, 10, -0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }

  checkOilOverlap(px, py, pr) {
    if (this.type !== 'oil') return false;
    // Simple ellipse approximation
    const dx = px - this.x, dy = py - this.y;
    const cos = Math.cos(-this.angle), sin = Math.sin(-this.angle);
    const lx = dx * cos - dy * sin, ly = dx * sin + dy * cos;
    return (lx * lx) / (35 * 35) + (ly * ly) / (25 * 25) < 1.2;
  }
}

// ── 8. PARTICLES / FX ──────────────────────────────────────
const Particles = {
  list: [],
  skidMarks: [],  // ring buffer
  MAX_SKIDS: 600,
  floatingTexts: [],
  rings: [],

  clear() {
    this.list = [];
    this.skidMarks = [];
    this.floatingTexts = [];
    this.rings = [];
  },

  spawn(x, y, color, count, opts = {}) {
    for (let i = 0; i < count; i++) {
      this.list.push({
        x, y, color,
        vx: U.randFloat(opts.vxMin || -100, opts.vxMax || 100),
        vy: U.randFloat(opts.vyMin || -100, opts.vyMax || 100),
        life: U.randFloat(opts.lifeMin || 0.3, opts.lifeMax || 0.8),
        maxLife: U.randFloat(opts.lifeMin || 0.3, opts.lifeMax || 0.8),
        size: U.randFloat(opts.sizeMin || 2, opts.sizeMax || 5),
        type: opts.type || 'spark',
      });
    }
  },

  addSkid(x, y, color, alpha) {
    this.skidMarks.push({ x, y, color, alpha, age: 0 });
    if (this.skidMarks.length > this.MAX_SKIDS) this.skidMarks.shift();
  },

  addFloat(x, y, text, color, size) {
    this.floatingTexts.push({ x, y, text, color, size: size || 16, life: 0.6, vy: -45 });
  },

  addRing(x, y, color) {
    this.rings.push({ x, y, color, radius: 0, maxRadius: 80, life: 0.3 });
  },

  update(dt) {
    // Particles
    for (let i = this.list.length - 1; i >= 0; i--) {
      const p = this.list[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      if (p.type === 'smoke') {
        p.vx *= 0.95; p.vy *= 0.95;
        p.size += dt * 8;
      }
      p.life -= dt;
      if (p.life <= 0) this.list.splice(i, 1);
    }

    // Skid marks fade
    for (let i = this.skidMarks.length - 1; i >= 0; i--) {
      this.skidMarks[i].age += dt;
      if (this.skidMarks[i].age > 6) this.skidMarks.splice(i, 1);
    }

    // Floating texts
    for (let i = this.floatingTexts.length - 1; i >= 0; i--) {
      const ft = this.floatingTexts[i];
      ft.y += ft.vy * dt;
      ft.life -= dt;
      if (ft.life <= 0) this.floatingTexts.splice(i, 1);
    }

    // Rings
    for (let i = this.rings.length - 1; i >= 0; i--) {
      const r = this.rings[i];
      r.radius += (r.maxRadius / 0.3) * dt;
      r.life -= dt;
      if (r.life <= 0) this.rings.splice(i, 1);
    }
  },

  renderSkids(ctx) {
    for (const s of this.skidMarks) {
      const alpha = Math.max(0, s.alpha * (1 - s.age / 6));
      ctx.fillStyle = s.color;
      ctx.globalAlpha = alpha;
      ctx.fillRect(s.x - 1.5, s.y - 1.5, 3, 3);
    }
    ctx.globalAlpha = 1;
  },

  renderParticles(ctx) {
    for (const p of this.list) {
      const alpha = p.life / p.maxLife;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      if (p.type === 'smoke') {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.type === 'shard') {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.life * 10);
        ctx.beginPath();
        ctx.moveTo(0, -p.size);
        ctx.lineTo(p.size * 0.7, p.size * 0.5);
        ctx.lineTo(-p.size * 0.7, p.size * 0.5);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      } else {
        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
      }
    }
    ctx.globalAlpha = 1;
  },

  renderFloats(ctx) {
    for (const ft of this.floatingTexts) {
      ctx.globalAlpha = U.clamp(ft.life / 0.3, 0, 1);
      U.text(ctx, ft.text, ft.x, ft.y, { color: ft.color, size: ft.size, align: 'center', bold: true, shadow: true });
    }
    ctx.globalAlpha = 1;
  },

  renderRings(ctx) {
    for (const r of this.rings) {
      ctx.globalAlpha = r.life / 0.3;
      ctx.strokeStyle = r.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  },
};

// ── 9. SCREEN FX ────────────────────────────────────────────
const ScreenFX = {
  shakeIntensity: 0,
  shakeDuration: 0,
  shakeTimer: 0,
  flashColor: null,
  flashAlpha: 0,
  flashTimer: 0,
  zoomPulse: 1,
  zoomTarget: 1,
  zoomTimer: 0,
  timeDilation: 1,
  timeTarget: 1,
  timeTimer: 0,
  desatAmount: 0,
  desatTarget: 0,
  freezeTimer: 0,

  shake(intensity, dur) {
    this.shakeIntensity = intensity;
    this.shakeDuration = dur;
    this.shakeTimer = dur;
  },

  flash(color, alpha, dur) {
    this.flashColor = color;
    this.flashAlpha = alpha;
    this.flashTimer = dur;
  },

  zoom(target, dur) {
    this.zoomTarget = target;
    this.zoomTimer = dur;
  },

  slowmo(factor, dur) {
    this.timeDilation = factor;
    this.timeTimer = dur;
  },

  freeze(dur) {
    this.freezeTimer = dur;
  },

  desaturate(target) {
    this.desatTarget = target;
  },

  reset() {
    this.shakeTimer = 0; this.flashTimer = 0; this.zoomPulse = 1;
    this.zoomTarget = 1; this.zoomTimer = 0;
    this.timeDilation = 1; this.timeTarget = 1; this.timeTimer = 0;
    this.desatAmount = 0; this.desatTarget = 0;
    this.freezeTimer = 0;
  },

  update(rawDt) {
    if (this.freezeTimer > 0) { this.freezeTimer -= rawDt; return 0; }

    if (this.shakeTimer > 0) this.shakeTimer -= rawDt;

    if (this.flashTimer > 0) this.flashTimer -= rawDt;

    if (this.zoomTimer > 0) {
      this.zoomPulse = U.lerp(this.zoomPulse, this.zoomTarget, 0.15);
      this.zoomTimer -= rawDt;
    } else {
      this.zoomPulse = U.lerp(this.zoomPulse, 1, 0.15);
    }

    if (this.timeTimer > 0) {
      this.timeTimer -= rawDt;
    } else {
      this.timeDilation = U.lerp(this.timeDilation, 1, 0.1);
    }

    this.desatAmount = U.lerp(this.desatAmount, this.desatTarget, 0.05);

    return rawDt * this.timeDilation;
  },

  applyPre(ctx) {
    // Shake
    let ox = 0, oy = 0;
    if (this.shakeTimer > 0) {
      const frac = this.shakeTimer / this.shakeDuration;
      const mag = this.shakeIntensity * frac;
      ox = U.randFloat(-mag, mag);
      oy = U.randFloat(-mag, mag);
    }

    ctx.save();
    ctx.translate(CFG.W/2, CFG.H/2);
    ctx.scale(this.zoomPulse, this.zoomPulse);
    ctx.translate(-CFG.W/2 + ox, -CFG.H/2 + oy);
  },

  applyPost(ctx) {
    ctx.restore();

    // Flash overlay
    if (this.flashTimer > 0 && this.flashColor) {
      ctx.fillStyle = this.flashColor;
      ctx.globalAlpha = this.flashAlpha * (this.flashTimer > 0 ? 1 : 0);
      ctx.fillRect(0, 0, CFG.W, CFG.H);
      ctx.globalAlpha = 1;
    }

    // Desaturation overlay
    if (this.desatAmount > 0.01) {
      ctx.fillStyle = CFG.C_PANEL;
      ctx.globalAlpha = this.desatAmount;
      ctx.fillRect(0, 0, CFG.W, CFG.H);
      ctx.globalAlpha = 1;
    }
  },
};

// ── 9b. CAMERA ──────────────────────────────────────────────
const Camera = {
  x: 0, y: 0,
  targetX: 0, targetY: 0,
  zoom: 1,

  update(dt, px, py, pvx, pvy, pSpeed) {
    // Camera lead: offset target in direction of travel
    const leadAmount = 40;
    const spd = pSpeed || 0;
    const leadFrac = U.clamp(spd / (CFG.MAX_SPEED * 0.8), 0, 1);
    const lvx = pvx || 0, lvy = pvy || 0;
    const lspd = Math.hypot(lvx, lvy) || 1;
    this.targetX = px + (lvx / lspd) * leadAmount * leadFrac;
    this.targetY = py + (lvy / lspd) * leadAmount * leadFrac;

    const speed = 6;
    const t = 1 - Math.exp(-speed * dt);
    this.x = U.lerp(this.x, this.targetX, t);
    this.y = U.lerp(this.y, this.targetY, t);
    // Clamp so viewport stays inside world
    this.x = U.clamp(this.x, CFG.W / 2, CFG.WORLD_W - CFG.W / 2);
    this.y = U.clamp(this.y, CFG.H / 2, CFG.WORLD_H - CFG.H / 2);

    // Dynamic zoom: slight zoom-out at high speed
    const targetZoom = 1 - leadFrac * 0.04; // up to 4% zoom-out
    this.zoom = U.lerp(this.zoom, targetZoom, t);
  },

  isVisible(wx, wy, margin) {
    margin = margin || 0;
    const sx = wx - this.x + CFG.W / 2;
    const sy = wy - this.y + CFG.H / 2;
    return sx >= -margin && sx <= CFG.W + margin && sy >= -margin && sy <= CFG.H + margin;
  },

  reset(px, py) {
    this.x = U.clamp(px, CFG.W / 2, CFG.WORLD_W - CFG.W / 2);
    this.y = U.clamp(py, CFG.H / 2, CFG.WORLD_H - CFG.H / 2);
    this.targetX = this.x;
    this.targetY = this.y;
    this.zoom = 1;
  },
};

// ── 9c. TRAIL (Encirclement) ────────────────────────────────
const Trail = {
  points: [],        // ring buffer of {x, y}
  MAX_POINTS: 400,
  head: 0,
  count: 0,
  recordTimer: 0,
  RECORD_INTERVAL: 0.05,
  checkTimer: 0,
  CHECK_INTERVAL: 0.15,
  CLOSE_DIST: 40,
  SKIP_RECENT: 20,

  reset() {
    this.points = [];
    this.head = 0;
    this.count = 0;
    this.recordTimer = 0;
    this.checkTimer = 0;
    this._flashPoly = null;
    this._flashPolyTimer = 0;
  },

  push(x, y) {
    if (this.count < this.MAX_POINTS) {
      this.points.push({ x, y });
      this.count++;
    } else {
      this.points[this.head] = { x, y };
    }
    this.head = (this.head + 1) % this.MAX_POINTS;
  },

  getPoint(i) {
    // i=0 is oldest, i=count-1 is newest
    if (this.count < this.MAX_POINTS) return this.points[i];
    return this.points[(this.head + i) % this.MAX_POINTS];
  },

  update(dt, player) {
    this._lastDt = dt;
    this._lastPlayerX = player.x;
    this._lastPlayerY = player.y;
    this.recordTimer -= dt;
    if (this.recordTimer <= 0) {
      this.push(player.x, player.y);
      this.recordTimer = this.RECORD_INTERVAL;
    }
    // Flash polygon timer
    if (this._flashPolyTimer > 0) this._flashPolyTimer -= dt;
  },

  checkLoop(player, enemies, game) {
    this.checkTimer -= this._lastDt || 0;
    if (this.checkTimer > 0) return;
    this.checkTimer = this.CHECK_INTERVAL;

    if (this.count < this.SKIP_RECENT + 5) return;

    const px = player.x, py = player.y;
    const searchEnd = this.count - this.SKIP_RECENT;

    for (let i = 0; i < searchEnd; i++) {
      const pt = this.getPoint(i);
      const d = Math.hypot(px - pt.x, py - pt.y);
      if (d < this.CLOSE_DIST) {
        // Found a loop: extract polygon from point i to current position
        const poly = [];
        for (let j = i; j < this.count; j++) {
          const p = this.getPoint(j);
          poly.push(p);
        }
        poly.push({ x: px, y: py });

        if (poly.length < 10) continue; // too small

        // Check which enemies are inside
        let killCount = 0;
        for (const e of enemies) {
          if (!e.alive) continue;
          if (this._pointInPoly(e.x, e.y, poly)) {
            e.alive = false;
            killCount++;
            // FX
            Particles.spawn(e.x, e.y, CFG.C_ACCENT, 10, {
              vxMin: -200, vxMax: 200, vyMin: -200, vyMax: 200,
              lifeMin: 0.3, lifeMax: 0.7, sizeMin: 3, sizeMax: 8, type: 'shard',
            });
            Particles.addRing(e.x, e.y, CFG.C_ACCENT);
          }
        }

        if (killCount > 0) {
          const comboMult = Math.max(1, Math.floor(player.comboLevel + 1));
          const baseScore = 100 * killCount;
          const bonus = killCount >= 2 ? 50 * killCount : 0;
          const encircleBonus = player.encircleScoreBonus || 1;
          const total = Math.floor((baseScore + bonus) * comboMult * encircleBonus);
          game.score += total * player.scoreMult;
          // Award combo levels for encirclement
          player.comboLevel = Math.min(CFG.MAX_COMBO, player.comboLevel + 2 * killCount);
          game.encircleCount += killCount;
          const label = killCount >= 2 ? `ENCIRCLE x${killCount}! +${total}` : `ENCIRCLE! +${total}`;
          Particles.addFloat(px, py - 40, label, CFG.C_ACCENT, 18);
          // Flash the enclosed polygon briefly
          this._flashPoly = poly.slice();
          this._flashPolyTimer = 0.3;
          ScreenFX.flash(CFG.C_ACCENT, 0.15, 0.12);
          ScreenFX.shake(5, 0.2);

          // Clear trail after successful encirclement
          this.points = [];
          this.head = 0;
          this.count = 0;
          return;
        }
        break; // only check first matching loop
      }
    }
  },

  _pointInPoly(x, y, poly) {
    let inside = false;
    for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
      const xi = poly[i].x, yi = poly[i].y;
      const xj = poly[j].x, yj = poly[j].y;
      if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) {
        inside = !inside;
      }
    }
    return inside;
  },

  render(ctx) {
    if (this.count < 2) return;

    // Trail with color gradient: dim oldest -> bright cyan newest
    ctx.save();
    ctx.shadowColor = CFG.C_ACCENT;
    ctx.shadowBlur = 6;
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    for (let i = 1; i < this.count; i++) {
      const frac = i / this.count; // 0=oldest, 1=newest
      const alpha = 0.08 + frac * 0.30; // 0.08 -> 0.38
      const r = Math.round(53 + frac * (53 - 53));
      const g = Math.round(100 + frac * (242 - 100));
      const b = Math.round(140 + frac * (208 - 140));
      ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
      ctx.beginPath();
      const p0 = this.getPoint(i - 1);
      const p1 = this.getPoint(i);
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.stroke();
    }
    ctx.restore();

    // Flash polygon from encirclement kill
    if (this._flashPoly && this._flashPolyTimer > 0) {
      ctx.save();
      ctx.globalAlpha = (this._flashPolyTimer / 0.3) * 0.25;
      ctx.fillStyle = CFG.C_ACCENT;
      ctx.beginPath();
      ctx.moveTo(this._flashPoly[0].x, this._flashPoly[0].y);
      for (let i = 1; i < this._flashPoly.length; i++) {
        ctx.lineTo(this._flashPoly[i].x, this._flashPoly[i].y);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    // Loop-closing preview: dashed line when near an older trail point
    if (this.count > this.SKIP_RECENT + 5) {
      const px = this._lastPlayerX, py = this._lastPlayerY;
      if (px !== undefined) {
        const previewDist = 80;
        const searchEnd = this.count - this.SKIP_RECENT;
        for (let i = 0; i < searchEnd; i++) {
          const pt = this.getPoint(i);
          const d = Math.hypot(px - pt.x, py - pt.y);
          if (d < previewDist) {
            const closeness = 1 - d / previewDist; // 1=very close, 0=at edge
            ctx.save();
            ctx.strokeStyle = CFG.C_ACCENT;
            ctx.globalAlpha = 0.3 + closeness * 0.4;
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 4]);
            ctx.beginPath();
            ctx.moveTo(px, py);
            ctx.lineTo(pt.x, pt.y);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
            break;
          }
        }
      }
    }
  },
};

// ── 10. WAVE MANAGER ────────────────────────────────────────
const Waves = {
  waveIndex: 0,
  waveTimer: 0,
  phase: 'combat', // 'combat' | 'break'
  spawnTimer: 0,
  burstTimer: 0,
  breakTimer: 0,
  enemies: [],
  obstacles: [],
  scraps: [],
  scrapTimer: 0,
  upgradeCards: [],
  upgradeChosen: false,
  cadenceMult: 1,

  reset() {
    this.waveIndex = 0;
    this.waveTimer = 0;
    this.phase = 'combat';
    this.spawnTimer = CFG.FIRST_SPAWN_INITIAL;
    this.burstTimer = CFG.BURST_INTERVAL;
    this.breakTimer = 0;
    this.enemies = [];
    this.obstacles = [];
    this.scraps = [];
    this.scrapTimer = CFG.SCRAP_INTERVAL;
    this.upgradeCards = [];
    this.upgradeChosen = false;
    this.cadenceMult = 1;
    this._burstQueue = [];
    this.currentFirstSpawn = CFG.FIRST_SPAWN_INITIAL;
    this.currentSpawnInterval = CFG.SPAWN_INTERVAL_INITIAL;
    this.currentCombatDuration = CFG.WAVE_COMBAT;
    this.noBursts = false;
  },

  startWave(player) {
    this.waveIndex++;
    this.waveTimer = 0;
    this.phase = 'combat';
    this.enemies = [];
    this.upgradeChosen = false;

    // Wave-specific timing ramp: wave 1 is easiest, fully ramped by wave 5
    const ramp = Math.min(1, (this.waveIndex - 1) / 4);
    this.currentFirstSpawn = U.lerp(CFG.FIRST_SPAWN_INITIAL, CFG.FIRST_SPAWN_MIN, ramp);
    this.currentSpawnInterval = U.lerp(CFG.SPAWN_INTERVAL_INITIAL, CFG.SPAWN_INTERVAL_MIN, ramp);
    this.currentCombatDuration = this.waveIndex === 1 ? CFG.WAVE_COMBAT_WAVE1 : CFG.WAVE_COMBAT;
    this.noBursts = this.waveIndex === 1;

    this.spawnTimer = this.currentFirstSpawn;
    this.burstTimer = CFG.BURST_INTERVAL;

    // Spawn hazards around player
    this.obstacles = [];
    const hazCount = Math.min(8, 2 + Math.floor(this.waveIndex / 2));
    for (let i = 0; i < hazCount; i++) {
      const angle = U.randFloat(0, Math.PI * 2);
      const dist = U.randFloat(180, 320);
      const hx = player.x + Math.cos(angle) * dist;
      const hy = player.y + Math.sin(angle) * dist;
      // Avoid player zone
      if (U.dist(hx, hy, player.x, player.y) < 140) continue;
      const types = ['barrier', 'cones', 'oil'];
      const hType = U.randChoice(types);
      const hAngle = [0, Math.PI/2, Math.PI, Math.PI*3/2][U.randInt(0, 3)];
      this.obstacles.push(new Obstacle(hType,
        U.clamp(hx, 60, CFG.WORLD_W - 60),
        U.clamp(hy, 60, CFG.WORLD_H - 60), hAngle));
    }
  },

  getEnemyType(score) {
    const pool = ['chaser'];
    if (score >= 1000) pool.push('interceptor');
    if (score >= 1500) pool.push('drifter');
    return U.randChoice(pool);
  },

  spawnEnemy(score, speedBonus, player) {
    // Spawn at random angle around player, ~550px away (just off-screen)
    const angle = U.randFloat(0, Math.PI * 2);
    const dist = 550;
    let x = player.x + Math.cos(angle) * dist;
    let y = player.y + Math.sin(angle) * dist;
    // Clamp to world
    x = U.clamp(x, 10, CFG.WORLD_W - 10);
    y = U.clamp(y, 10, CFG.WORLD_H - 10);

    const type = this.getEnemyType(score);
    const e = new Enemy(type, x, y);
    e.heading = Math.atan2(player.y - y, player.x - x);
    // Speed scaling at 2000+
    e.maxSpeed += speedBonus;
    e.baseMaxSpeed = e.maxSpeed;
    this.enemies.push(e);
  },

  update(dt, player, score, game) {
    if (this.phase === 'combat') {
      this.waveTimer += dt;

      // Enemy spawning
      this.spawnTimer -= dt;
      if (this.spawnTimer <= 0) {
        this.spawnEnemy(score, game.speedBonus, player);
        this.spawnTimer = this.currentSpawnInterval * this.cadenceMult;
      }

      // Burst spawning (disabled wave 1)
      if (!this.noBursts) {
        this.burstTimer -= dt;
        if (this.burstTimer <= 0) {
          // Queue burst spawns using internal timers instead of setTimeout
          for (let i = 0; i < CFG.BURST_COUNT; i++) {
            this._burstQueue.push({ delay: i * CFG.BURST_DELAY, score, speedBonus: game.speedBonus, player });
          }
          this.burstTimer = CFG.BURST_INTERVAL;
        }
      }
      // Process burst queue
      for (let i = this._burstQueue.length - 1; i >= 0; i--) {
        this._burstQueue[i].delay -= dt;
        if (this._burstQueue[i].delay <= 0) {
          const b = this._burstQueue.splice(i, 1)[0];
          if (this.phase === 'combat') this.spawnEnemy(b.score, b.speedBonus, b.player);
        }
      }

      // Wave end
      if (this.waveTimer >= this.currentCombatDuration) {
        this.phase = 'break';
        this.breakTimer = CFG.WAVE_BREAK;
        this.enemies = [];
        // Build upgrade offer
        this.upgradeCards = game.buildUpgradeOffer();
        this.upgradeChosen = false;
      }
    } else if (this.phase === 'break') {
      this.breakTimer -= dt;
      if (this.breakTimer <= 0 || this.upgradeChosen) {
        if (!this.upgradeChosen && this.upgradeCards.length > 0) {
          // Auto-pick random
          game.applyUpgrade(this.upgradeCards[U.randInt(0, this.upgradeCards.length - 1)]);
          this.upgradeChosen = true;
        }
        this.startWave(player);
      }
    }

    // Update enemies
    for (const e of this.enemies) {
      e.update(dt, player);
    }
    this.enemies = this.enemies.filter(e => e.alive);

    // Update obstacle near-miss cooldowns
    for (const o of this.obstacles) {
      if (o.nearMissCooldown > 0) o.nearMissCooldown -= dt;
    }

    // Scrap spawning
    this.scrapTimer -= dt;
    if (this.scrapTimer <= 0 && this.phase === 'combat') {
      const angle = U.randFloat(0, Math.PI * 2);
      const dist = U.randFloat(220, 340);
      this.scraps.push({
        x: U.clamp(player.x + Math.cos(angle) * dist, 40, CFG.WORLD_W - 40),
        y: U.clamp(player.y + Math.sin(angle) * dist, 40, CFG.WORLD_H - 40),
        life: 15, bobPhase: U.randFloat(0, Math.PI * 2),
      });
      this.scrapTimer = CFG.SCRAP_INTERVAL;
    }

    // Update scraps
    for (let i = this.scraps.length - 1; i >= 0; i--) {
      const s = this.scraps[i];
      s.life -= dt;
      s.bobPhase += dt * 3;
      // Magnet
      if (player.magnetRange > 0) {
        const d = U.dist(s.x, s.y, player.x, player.y);
        if (d < player.magnetRange) {
          const pull = 200 * dt / Math.max(d, 1);
          s.x += (player.x - s.x) * pull;
          s.y += (player.y - s.y) * pull;
        }
      }
      // Collection
      if (U.dist(s.x, s.y, player.x, player.y) < CFG.SCRAP_RADIUS + player.radius + 10) {
        this.scraps.splice(i, 1);
        return 'scrap';
      }
      if (s.life <= 0) this.scraps.splice(i, 1);
    }
    return null;
  },

  renderArena(ctx, time) {
    // Background - fill visible area in world space
    ctx.fillStyle = CFG.C_BG;
    ctx.fillRect(Camera.x - CFG.W / 2, Camera.y - CFG.H / 2, CFG.W, CFG.H);

    // Diagonal scanlines tiled relative to camera
    const vx = Camera.x - CFG.W / 2;
    const vy = Camera.y - CFG.H / 2;
    ctx.strokeStyle = CFG.C_BG2;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.3;
    const startI = Math.floor((vx - CFG.H) / 20) * 20;
    const endI = vx + CFG.W + CFG.H;
    for (let i = startI; i < endI; i += 20) {
      ctx.beginPath();
      ctx.moveTo(i, vy);
      ctx.lineTo(i + CFG.H, vy + CFG.H);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Faint lane fragments
    ctx.fillStyle = CFG.C_BG2;
    ctx.globalAlpha = 0.15;
    const fragOffset = (time * 15) % 80;
    for (let i = 0; i < 8; i++) {
      const fx = vx + 100 + i * 120;
      const fy = vy + ((fragOffset + i * 60) % (CFG.H + 40)) - 20;
      ctx.fillRect(fx, fy, 30, 3);
    }
    ctx.globalAlpha = 1;

    // World boundary line
    ctx.strokeStyle = CFG.C_PANEL;
    ctx.lineWidth = 2;
    ctx.strokeRect(CFG.ARENA_PAD, CFG.ARENA_PAD, CFG.WORLD_W - CFG.ARENA_PAD*2, CFG.WORLD_H - CFG.ARENA_PAD*2);

    // Dust motes (camera-relative)
    ctx.fillStyle = CFG.C_PANEL;
    ctx.globalAlpha = 0.2;
    for (let i = 0; i < 6; i++) {
      const mx = vx + ((time * 20 + i * 173) % CFG.W);
      const my = vy + ((time * 12 + i * 247) % CFG.H);
      ctx.beginPath();
      ctx.arc(mx, my, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Vignette is rendered in screen space (after applyPost)
  },

  renderObstacles(ctx) {
    for (const o of this.obstacles) o.render(ctx);
  },

  renderEnemies(ctx, time) {
    for (const e of this.enemies) e.render(ctx, time);
  },

  renderScraps(ctx) {
    for (const s of this.scraps) {
      const bob = Math.sin(s.bobPhase) * 3;
      ctx.save();
      ctx.translate(s.x, s.y + bob);
      // Hex shape
      ctx.fillStyle = CFG.C_PICKUP;
      ctx.shadowColor = CFG.C_PICKUP;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = Math.PI / 3 * i - Math.PI / 6;
        const px = Math.cos(a) * CFG.SCRAP_RADIUS;
        const py = Math.sin(a) * CFG.SCRAP_RADIUS;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.restore();
    }
  },
};
