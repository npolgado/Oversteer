<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OVERSTEER</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
canvas {
  display: block;
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  image-rendering: pixelated;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ============================================================
// OVERSTEER — Top-Down Arena Drifter
// Single-file implementation
// ============================================================

// ── 1. CONFIG ───────────────────────────────────────────────
const CFG = {
  W: 1920, H: 1080,
  // UI scale factor (reference: 1280x720)
  get S() { return Math.min(this.W / 1280, this.H / 720); },
  // Physics
  ACCEL: 900,
  MAX_SPEED: 520,
  REVERSE_ACCEL: 600,
  REVERSE_MAX: 240,
  TURN_RATE: 240 * Math.PI / 180, // rad/sec
  TURN_REDUCE_AT_MAX: 0.45,
  LATERAL_FRICTION: 8.5,
  FORWARD_DRAG: 1.7,
  DRIFT_LATERAL: 3.2,
  DRIFT_DRAG: 2.1,
  DRIFT_THRESHOLD: 180,
  DRIFT_BOOST: 60,
  ARENA_PAD: 24,
  BOUNCE_RETAIN: 0.35,
  // Player
  PLAYER_W: 34, PLAYER_H: 18, PLAYER_SPRITE_S: 56,
  PLAYER_RADIUS: 10,
  PLAYER_DRIFT_SHRINK: 2,
  // Enemies
  CHASER_SPEED: 420,
  INTERCEPTOR_SPEED: 460,
  DRIFTER_SPEED: 440,
  ENEMY_RADIUS: 9,
  ENEMY_W: 32, ENEMY_H: 16, ENEMY_SPRITE_S: 50,
  ENEMY_ACCEL: 700,
  ENEMY_TURN_RATE: 200 * Math.PI / 180,
  // Near-miss
  NEAR_MISS_ENEMY: 8,
  NEAR_MISS_HAZARD: 10,
  NEAR_MISS_COOLDOWN: 1.2,
  // Scoring
  SCORE_PER_SEC: 4,
  NEAR_MISS_ENEMY_PTS: 25,
  NEAR_MISS_HAZARD_PTS: 15,
  DRIFT_COMBO_INTERVAL: 1.0,
  DRIFT_COMBO_BASE: 5,
  MAX_COMBO: 8,
  // Waves
  WAVE_COMBAT: 25,
  WAVE_BREAK: 8,
  FIRST_SPAWN: 0.8,
  SPAWN_INTERVAL: 2.2,
  BURST_INTERVAL: 8,
  BURST_COUNT: 2,
  BURST_DELAY: 0.3,
  // Hazards
  // Scrap
  SCRAP_INTERVAL: 6,
  SCRAP_RADIUS: 7,
  SCRAP_NEAR_MISS_CHANCE: 0.35,
  // Upgrades
  UPGRADES_TO_OFFER: 3,
  UPGRADE_BREAK_TIME: 8,
  // Colors
  C_BG: '#07080B',
  C_BG2: '#0E1118',
  C_PANEL: '#1A2233',
  C_TEXT: '#EAEFF7',
  C_PLAYER: '#EAEFF7',
  C_ACCENT: '#35F2D0',
  C_ENEMY: '#FF3B6B',
  C_ENEMY_DARK: '#7A1B33',
  C_PICKUP: '#FFB000',
  C_RARE: '#7C5CFF',
  C_SHIELD: '#5BFF4A',
  // Death
  FREEZE_TIME: 0.10,
  DEATH_SLOWMO: 0.35,
  DEATH_SLOWMO_DUR: 0.35,
  SHARD_COUNT_MIN: 10,
  SHARD_COUNT_MAX: 14,
  // Shield
  SHIELD_KNOCKBACK: 140,
  SHIELD_INVULN: 1.0,
  // Open World
  WORLD_W: 3000, WORLD_H: 3000,
  // Enemy lifespan
  ENEMY_LIFESPAN_MIN: 10, ENEMY_LIFESPAN_MAX: 18,
  ENEMY_OFFSCREEN_BOOST: 1.5,
  ENEMY_OFFSCREEN_DESPAWN: 5,
  ENEMY_FAR_DESPAWN_DIST: 1200,
  // Handbrake
  HANDBRAKE_TURN_MULT: 2.0,
  HANDBRAKE_DURATION: 0.3,
  HANDBRAKE_DECEL: 1800,
  // Speed boost zones
  BOOST_ZONE_RADIUS: 22,
  BOOST_ZONE_DURATION: 1.5,
  BOOST_ZONE_MULT: 1.3,
  BOOST_ZONE_SPAWN_INTERVAL: 12,
  // Drift chaining
  DRIFT_CHAIN_WINDOW: 0.5,
  DRIFT_CHAIN_MULT_1: 1.5,
  DRIFT_CHAIN_MULT_2: 2.0,
  // Wall riding
  WALL_RIDE_DIST: 30,
  WALL_RIDE_SPEED_BONUS: 0.10,
  // Early-game balancing
  FIRST_SPAWN_INITIAL: 2.5,
  SPAWN_INTERVAL_INITIAL: 4.0,
  FIRST_SPAWN_MIN: 0.6,
  SPAWN_INTERVAL_MIN: 1.5,
  WAVE_COMBAT_WAVE1: 30,
  // Props
  PROP_CHUNK_SIZE: 500,
  PROP_DENSITY: 0.00001,
  PROP_MIN_DIST: 100,
  PROP_POOL: [
    { image: 'props/tree_1.png', radius: 50, weight: 3, type: 'solid' },
    { image: 'props/rock_1.png', radius: 40, weight: 2, type: 'solid' },
    { image: 'props/mud_1.png',  radius: 62, weight: 2, type: 'slow', duration: 2.0, strength: 0.5 },
    { image: 'props/puddle_1.png', radius: 55, weight: 2, type: 'slip', duration: 1.5, strength: 0.6 },
    { image: 'props/bush_1.png', radius: 25, weight: 5, type: 'decoration' },
  ],
  // Sprite paths (for future PNG support)
  PLAYER_SPRITE: 'cars/player.png',
  ENEMY_SPRITES: ['cars/enemy_red.png', 'cars/enemy_orange.png'],
  BACKGROUND_SPRITE: 'background.png',
};

// Scale helper: converts reference-resolution pixels to current resolution
function S(px) { return Math.round(px * CFG.S); }

// ── PRE-RENDERED FX CACHES ──────────────────────────────────
const FXCache = {
  vignetteCanvas: null,
  propGlow: {},  // keyed by "radius_type"

  initVignette() {
    const c = document.createElement('canvas');
    c.width = CFG.W; c.height = CFG.H;
    const cx = c.getContext('2d');
    const vig = cx.createRadialGradient(CFG.W/2, CFG.H/2, CFG.H * 0.3, CFG.W/2, CFG.H/2, CFG.W * 0.7);
    vig.addColorStop(0, 'rgba(0,0,0,0)');
    vig.addColorStop(1, 'rgba(0,0,0,0.5)');
    cx.fillStyle = vig;
    cx.fillRect(0, 0, CFG.W, CFG.H);
    this.vignetteCanvas = c;
  },

  initPropGlow() {
    const glowColors = {
      solid:      { c0: 'rgba(255,50,30,0.6)',  c1: 'rgba(255,30,10,0.25)', c2: 'rgba(255,0,0,0)' },
      slow:       { c0: 'rgba(180,120,40,0.5)', c1: 'rgba(140,80,20,0.2)',  c2: 'rgba(100,50,0,0)' },
      slip:       { c0: 'rgba(60,120,220,0.5)', c1: 'rgba(40,80,180,0.2)',  c2: 'rgba(20,40,140,0)' },
      decoration: { c0: 'rgba(40,140,40,0.3)',  c1: 'rgba(30,100,30,0.1)',  c2: 'rgba(20,60,20,0)' },
    };
    for (const def of CFG.PROP_POOL) {
      const key = def.radius + '_' + def.type;
      if (this.propGlow[key]) continue;
      const glowR = def.radius * 2;
      const size = Math.ceil(glowR * 2) + 2;
      const c = document.createElement('canvas');
      c.width = size; c.height = size;
      const cx = c.getContext('2d');
      const center = size / 2;
      const colors = glowColors[def.type] || glowColors.solid;
      const g = cx.createRadialGradient(center, center, def.radius * 0.2, center, center, glowR);
      g.addColorStop(0, colors.c0);
      g.addColorStop(0.5, colors.c1);
      g.addColorStop(1, colors.c2);
      cx.fillStyle = g;
      cx.beginPath();
      cx.arc(center, center, glowR, 0, Math.PI * 2);
      cx.fill();
      this.propGlow[key] = { canvas: c, size };
    }
  },

  init() {
    this.initVignette();
    this.initPropGlow();
  },
};

// ── 2. UTILS ────────────────────────────────────────────────
const U = {
  lerp(a, b, t) { return a + (b - a) * t; },
  clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); },
  randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; },
  randFloat(a, b) { return Math.random() * (b - a) + a; },
  randChoice(arr) { return arr[Math.floor(Math.random() * arr.length)]; },
  randSample(arr, n) {
    const c = arr.slice(), o = [];
    for (let i = 0; i < n && c.length; i++) {
      const idx = Math.floor(Math.random() * c.length);
      o.push(c.splice(idx, 1)[0]);
    }
    return o;
  },
  approach(cur, tgt, step) {
    if (cur < tgt) return Math.min(cur + step, tgt);
    if (cur > tgt) return Math.max(cur - step, tgt);
    return tgt;
  },
  normalizeAngle(a) {
    while (a > Math.PI) a -= 2 * Math.PI;
    while (a < -Math.PI) a += 2 * Math.PI;
    return a;
  },
  angleLerp(a, b, t) {
    return a + U.normalizeAngle(b - a) * t;
  },
  angleDiff(a, b) {
    return U.normalizeAngle(b - a);
  },
  vec2FromAngle(a) { return { x: Math.cos(a), y: Math.sin(a) }; },
  dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); },
  drawRotatedRect(ctx, cx, cy, w, h, angle, fill, stroke) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    if (fill) { ctx.fillStyle = fill; ctx.fillRect(-w/2, -h/2, w, h); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 1.5; ctx.strokeRect(-w/2, -h/2, w, h); }
    ctx.restore();
  },
  roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  },
  text(ctx, str, x, y, opts = {}) {
    const { color = '#fff', size = 18, align = 'left', shadow = false, bold = false } = opts;
    const sz = Math.max(1, Math.round(size * CFG.S));
    ctx.font = `${bold ? 'bold ' : ''}${sz}px 'Courier New', monospace`;
    ctx.textAlign = align;
    ctx.textBaseline = 'middle';
    if (shadow) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillText(str, x + S(2), y + S(2));
    }
    ctx.fillStyle = color;
    ctx.fillText(str, x, y);
  },
  wrapText(ctx, text, x, y, maxW, lineH, opts = {}) {
    const sz = Math.max(1, Math.round((opts.size || 13) * CFG.S));
    ctx.font = `${sz}px 'Courier New', monospace`;
    ctx.textAlign = opts.align || 'left';
    ctx.textBaseline = 'top';
    ctx.fillStyle = opts.color || '#fff';
    const words = text.split(' ');
    let line = '', ly = y;
    for (const w of words) {
      const test = line + (line ? ' ' : '') + w;
      if (ctx.measureText(test).width > maxW && line) {
        ctx.fillText(line, x, ly);
        line = w; ly += lineH;
      } else line = test;
    }
    if (line) ctx.fillText(line, x, ly);
  },
};

// ── 2b. ASSET MANAGER ───────────────────────────────────────
const Assets = {
  _cache: {},
  _basePath: 'assets/',

  load(path) {
    if (this._cache[path]) return this._cache[path];
    const img = new Image();
    img.src = this._basePath + path;
    img._loaded = false;
    img.onload = () => { img._loaded = true; };
    img.onerror = () => { img._loaded = false; };
    this._cache[path] = img;
    return img;
  },

  drawOrFallback(ctx, path, x, y, w, h, fallbackFn) {
    const img = this._cache[path];
    if (img && img._loaded) {
      ctx.drawImage(img, x - w / 2, y - h / 2, w, h);
      return true;
    }
    fallbackFn(ctx);
    return false;
  },

  preload(paths) {
    for (const p of paths) this.load(p);
  },
};

// Preload configured sprites
Assets.preload([
  CFG.PLAYER_SPRITE,
  ...CFG.ENEMY_SPRITES,
  ...CFG.PROP_POOL.map(p => p.image),
  CFG.BACKGROUND_SPRITE,
]);

// ── 3. INPUT ────────────────────────────────────────────────
const Input = {
  keys: {},
  up: false, down: false, left: false, right: false,
  drift: false, pause: false, enter: false,
  _pausePressed: false, _enterPressed: false,
  // Touch state
  touch: { active: false, stickId: null, stickOrigin: null, stickPos: null, driftId: null, pauseTap: false },

  init() {
    document.addEventListener('keydown', e => {
      Input.keys[e.code] = true;
      e.preventDefault();
    });
    document.addEventListener('keyup', e => {
      Input.keys[e.code] = false;
    });
    // Touch controls
    const cv = document.getElementById('c');
    cv.addEventListener('touchstart', e => { e.preventDefault(); Input._touchStart(e); }, { passive: false });
    cv.addEventListener('touchmove', e => { e.preventDefault(); Input._touchMove(e); }, { passive: false });
    cv.addEventListener('touchend', e => { e.preventDefault(); Input._touchEnd(e); }, { passive: false });
    cv.addEventListener('touchcancel', e => { e.preventDefault(); Input._touchEnd(e); }, { passive: false });
  },

  _getTouchPos(t) {
    const cv = document.getElementById('c');
    const r = cv.getBoundingClientRect();
    return {
      x: (t.clientX - r.left) / r.width * CFG.W,
      y: (t.clientY - r.top) / r.height * CFG.H
    };
  },

  _touchStart(e) {
    const t = this.touch;
    // Two-finger = pause
    if (e.touches.length >= 2) { t.pauseTap = true; return; }
    for (const touch of e.changedTouches) {
      const p = this._getTouchPos(touch);
      if (p.x < CFG.W / 2) {
        // Left side = stick
        t.active = true;
        t.stickId = touch.identifier;
        t.stickOrigin = { x: p.x, y: p.y };
        t.stickPos = { x: p.x, y: p.y };
      } else {
        // Right side = drift
        t.driftId = touch.identifier;
      }
    }
  },

  _touchMove(e) {
    const t = this.touch;
    for (const touch of e.changedTouches) {
      if (touch.identifier === t.stickId) {
        t.stickPos = this._getTouchPos(touch);
      }
    }
  },

  _touchEnd(e) {
    const t = this.touch;
    for (const touch of e.changedTouches) {
      if (touch.identifier === t.stickId) {
        t.stickId = null; t.stickOrigin = null; t.stickPos = null; t.active = false;
      }
      if (touch.identifier === t.driftId) {
        t.driftId = null;
      }
    }
  },

  poll() {
    const k = this.keys;
    this.up = !!(k['ArrowUp'] || k['KeyW']);
    this.down = !!(k['ArrowDown'] || k['KeyS']);
    this.left = !!(k['ArrowLeft'] || k['KeyA']);
    this.right = !!(k['ArrowRight'] || k['KeyD']);
    this.drift = !!k['Space'];

    // Touch stick
    const t = this.touch;
    if (t.stickOrigin && t.stickPos) {
      const dx = t.stickPos.x - t.stickOrigin.x;
      const dy = t.stickPos.y - t.stickOrigin.y;
      const mag = Math.hypot(dx, dy);
      if (mag > S(15)) {
        const angle = Math.atan2(dy, dx);
        this.up = this.up || dy < -S(15);
        this.down = this.down || dy > S(15);
        this.left = this.left || dx < -S(15);
        this.right = this.right || dx > S(15);
      }
    }
    if (t.driftId !== null) this.drift = true;

    // Edge-triggered pause
    const pNow = !!(k['KeyP'] || k['Escape']);
    this.pause = pNow && !this._pausePressed;
    this._pausePressed = pNow;

    // Edge-triggered enter
    const eNow = !!k['Enter'];
    this.enter = eNow && !this._enterPressed;
    this._enterPressed = eNow;

    // Touch pause
    if (t.pauseTap) { this.pause = true; t.pauseTap = false; }
  },
};

// ── 4. SHARED PHYSICS ENGINE ────────────────────────────────
function updatePhysics(ent, dt, turnInput, throttle, braking, wantDrift, isPlayer) {
  const speed = Math.hypot(ent.vx, ent.vy);

  // Drift activation
  if (wantDrift && speed >= CFG.DRIFT_THRESHOLD) {
    if (!ent.drifting) {
      ent.drifting = true;
      ent.driftJustStarted = true;
      // Boost impulse (Drift King: +50%, Afterburner: x2, drift chain stacks)
      let driftBoost = CFG.DRIFT_BOOST;
      if (ent.driftKing) driftBoost *= 1.5;
      if (ent.afterburner) driftBoost *= 2;
      // Drift chaining: re-entering drift within window
      if (isPlayer && ent.lastDriftEndTime > 0) {
        const elapsed = performance.now() / 1000 - ent.lastDriftEndTime;
        if (elapsed < CFG.DRIFT_CHAIN_WINDOW) {
          ent.driftChain = Math.min(2, (ent.driftChain || 0) + 1);
          const chainMult = ent.driftChain === 1 ? CFG.DRIFT_CHAIN_MULT_1 : CFG.DRIFT_CHAIN_MULT_2;
          driftBoost *= chainMult;
        } else {
          ent.driftChain = 0;
        }
        ent.lastDriftEndTime = 0;
      }
      const dir = U.vec2FromAngle(ent.heading);
      ent.vx += dir.x * driftBoost;
      ent.vy += dir.y * driftBoost;
    }
  } else {
    ent.drifting = false;
  }

  // Turn rate (reduced at high speed)
  const speedFrac = U.clamp(speed / (ent.maxSpeed || CFG.MAX_SPEED), 0, 1);
  const turnMult = 1 - speedFrac * CFG.TURN_REDUCE_AT_MAX;
  const turnRate = (ent.turnRate || CFG.TURN_RATE) * turnMult;
  ent.heading += turnInput * turnRate * dt;
  ent.heading = U.normalizeAngle(ent.heading);

  // Acceleration
  const fwd = U.vec2FromAngle(ent.heading);
  if (throttle) {
    ent.vx += fwd.x * CFG.ACCEL * dt;
    ent.vy += fwd.y * CFG.ACCEL * dt;
  }
  if (braking) {
    // If moving forward, brake; if slow, reverse
    const dot = ent.vx * fwd.x + ent.vy * fwd.y;
    if (dot > 30) {
      // Brake
      ent.vx -= fwd.x * CFG.ACCEL * 1.5 * dt;
      ent.vy -= fwd.y * CFG.ACCEL * 1.5 * dt;
    } else {
      // Reverse
      ent.vx -= fwd.x * CFG.REVERSE_ACCEL * dt;
      ent.vy -= fwd.y * CFG.REVERSE_ACCEL * dt;
    }
  }

  // Decompose velocity into forward and lateral
  const dot = ent.vx * fwd.x + ent.vy * fwd.y;
  const latX = ent.vx - fwd.x * dot;
  const latY = ent.vy - fwd.y * dot;

  // Apply friction
  let latFric = ent.drifting ? CFG.DRIFT_LATERAL : CFG.LATERAL_FRICTION;
  if (ent.drifting && ent.driftKing) latFric *= 0.75; // Drift King: reduced drift lateral friction
  const fwdDrag = ent.drifting ? CFG.DRIFT_DRAG : CFG.FORWARD_DRAG;

  // Oil slip override
  const effectiveLatFric = latFric;

  const latDecay = Math.exp(-effectiveLatFric * dt);
  const fwdDecay = Math.exp(-fwdDrag * dt);

  ent.vx = fwd.x * dot * fwdDecay + latX * latDecay;
  ent.vy = fwd.y * dot * fwdDecay + latY * latDecay;

  // Clamp speed
  const newSpeed = Math.hypot(ent.vx, ent.vy);
  let maxSpd = braking && !throttle ? CFG.REVERSE_MAX : (ent.maxSpeed || CFG.MAX_SPEED);
  if (ent.slowTimer > 0) maxSpd *= ent.slowStrength;
  if (newSpeed > maxSpd) {
    const s = maxSpd / newSpeed;
    ent.vx *= s; ent.vy *= s;
  }

  // Move
  ent.x += ent.vx * dt;
  ent.y += ent.vy * dt;

  // Arena bounds (world-sized)
  const pad = CFG.ARENA_PAD;
  if (ent.x < pad) { ent.x = pad; ent.vx = Math.abs(ent.vx) * CFG.BOUNCE_RETAIN; ent.wallHit = true; }
  if (ent.x > CFG.WORLD_W - pad) { ent.x = CFG.WORLD_W - pad; ent.vx = -Math.abs(ent.vx) * CFG.BOUNCE_RETAIN; ent.wallHit = true; }
  if (ent.y < pad) { ent.y = pad; ent.vy = Math.abs(ent.vy) * CFG.BOUNCE_RETAIN; ent.wallHit = true; }
  if (ent.y > CFG.WORLD_H - pad) { ent.y = CFG.WORLD_H - pad; ent.vy = -Math.abs(ent.vy) * CFG.BOUNCE_RETAIN; ent.wallHit = true; }

  // Slip timer
  if (ent.slipTimer > 0) ent.slipTimer -= dt;
}

// ── 5. PLAYER ───────────────────────────────────────────────
class Player {
  constructor() { this.reset(); }

  reset() {
    this.x = CFG.WORLD_W / 2;
    this.y = CFG.WORLD_H / 2;
    this.vx = 0; this.vy = 0;
    this.heading = -Math.PI / 2; // facing up
    this.drifting = false;
    this.driftJustStarted = false;
    this.maxSpeed = CFG.MAX_SPEED;
    this.turnRate = CFG.TURN_RATE;
    this.shield = false;
    this.invulnTimer = 0;
    this.slipTimer = 0;
    this.slowTimer = 0;
    this.slowStrength = 1;
    this.wallHit = false;
    this.upgrades = [];
    this.comboLevel = 0;
    this.driftTime = 0;
    this.leanTimer = 0;
    this.leanDir = 0;
    this.exhaustTimer = 0;
    this.braking = false;
    this.glowPhase = 0;
    this.driftDeniedTimer = 0;
    // Upgrade flags
    this.tightTurns = false;
    this.driftKing = false;
    this.magnetRange = 0;
    this.scoreMult = 1;
    this.ghostFrameTimer = 0;
    this.thickPlating = false;
    this.afterburner = false;
    this.comboMaster = false;
    this.speedDemon = false;
    this.encircleScoreBonus = 1;
    // Handbrake
    this.handbrakeTimer = 0;
    // Speed boost
    this.speedBoostTimer = 0;
    // Drift chaining
    this.lastDriftEndTime = 0;
    this.driftChain = 0;
    // Wall riding
    this.wallRiding = false;
    // Near-miss streak
    this.consecutiveNearMisses = 0;
    this.nearMissStreakTimer = 0;
    this.frozen = false;
  }

  get speed() { return Math.hypot(this.vx, this.vy); }
  get radius() { return CFG.PLAYER_RADIUS - (this.drifting ? CFG.PLAYER_DRIFT_SHRINK : 0); }

  update(dt) {
    this.glowPhase += dt;
    if (this.frozen) return;
    // Turn input
    let turnInput = 0;
    if (Input.left) turnInput -= 1;
    if (Input.right) turnInput += 1;

    // Lean FX
    if (turnInput !== 0) { this.leanTimer = 0.08; this.leanDir = turnInput; }
    if (this.leanTimer > 0) this.leanTimer -= dt;

    // Exhaust FX
    if (Input.up) this.exhaustTimer = 0.06;
    if (this.exhaustTimer > 0) this.exhaustTimer -= dt;

    this.braking = Input.down;

    // Handbrake turn: reverse while moving forward fast
    if (Input.down && this.speed > CFG.DRIFT_THRESHOLD && !this.drifting) {
      const fwd = U.vec2FromAngle(this.heading);
      const dot = this.vx * fwd.x + this.vy * fwd.y;
      if (dot > 30 && this.handbrakeTimer <= 0) {
        this.handbrakeTimer = CFG.HANDBRAKE_DURATION;
      }
    }
    if (this.handbrakeTimer > 0) this.handbrakeTimer -= dt;

    // Speed boost timer
    if (this.speedBoostTimer > 0) this.speedBoostTimer -= dt;

    // Near-miss streak timer
    if (this.nearMissStreakTimer > 0) {
      this.nearMissStreakTimer -= dt;
      if (this.nearMissStreakTimer <= 0) this.consecutiveNearMisses = 0;
    }

    // Drift denied FX
    if (Input.drift && this.speed < CFG.DRIFT_THRESHOLD && !this.drifting) {
      this.driftDeniedTimer = 0.12;
    }
    if (this.driftDeniedTimer > 0) this.driftDeniedTimer -= dt;

    // Tight turns upgrade
    const origTurn = this.turnRate;
    const origMaxSpeed = this.maxSpeed;
    if (this.tightTurns) this.turnRate = CFG.TURN_RATE * 1.25;
    // Handbrake: boosted turn rate
    if (this.handbrakeTimer > 0) this.turnRate *= CFG.HANDBRAKE_TURN_MULT;
    // Speed boost zone: temporary max speed increase
    if (this.speedBoostTimer > 0) this.maxSpeed *= CFG.BOOST_ZONE_MULT;

    this.wallHit = false;
    this.driftJustStarted = false;
    updatePhysics(this, dt, turnInput, Input.up, Input.down, Input.drift, true);

    this.turnRate = origTurn;
    this.maxSpeed = origMaxSpeed;

    // Handbrake deceleration
    if (this.handbrakeTimer > 0) {
      const spd = Math.hypot(this.vx, this.vy);
      if (spd > 10) {
        const decel = Math.min(CFG.HANDBRAKE_DECEL * dt, spd * 0.5);
        const s = (spd - decel) / spd;
        this.vx *= s;
        this.vy *= s;
      }
    }

    // Wall riding detection
    const pad = CFG.ARENA_PAD;
    const wd = CFG.WALL_RIDE_DIST;
    this.wallRiding = this.drifting && (
      this.x < pad + wd || this.x > CFG.WORLD_W - pad - wd ||
      this.y < pad + wd || this.y > CFG.WORLD_H - pad - wd
    );
    if (this.wallRiding) {
      // Speed bonus while wall riding
      const fwd = U.vec2FromAngle(this.heading);
      const boost = CFG.WALL_RIDE_SPEED_BONUS * (this.maxSpeed || CFG.MAX_SPEED) * dt;
      this.vx += fwd.x * boost;
      this.vy += fwd.y * boost;
    }

    // Drift time tracking + drift chaining
    const wasDrifting = this.driftTime > 0;
    if (this.drifting) {
      this.driftTime += dt;
    } else {
      if (wasDrifting && this.driftTime > 0) {
        // Just stopped drifting — record end time for chain detection
        this.lastDriftEndTime = this.driftTime > 0.1 ? performance.now() / 1000 : 0;
      }
      this.driftTime = 0;
      const comboDecay = this.comboMaster ? 1.0 : 2.0;
      this.comboLevel = Math.max(0, this.comboLevel - dt * comboDecay);
    }

    // Invulnerability
    if (this.invulnTimer > 0) this.invulnTimer -= dt;
    if (this.ghostFrameTimer > 0) this.ghostFrameTimer -= dt;
    if (this.slowTimer > 0) this.slowTimer -= dt;

  }

  render(ctx) {
    const speed = this.speed;
    const drifting = this.drifting;

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.heading);

    // Invulnerability blink
    if (this.invulnTimer > 0 && Math.floor(this.invulnTimer * 10) % 2 === 0) {
      ctx.globalAlpha = 0.4;
    }

    // Lean effect
    let sx = 1, sy = 1;
    if (this.leanTimer > 0) {
      sx = 1.03; sy = 0.97;
    }
    ctx.scale(sx, sy);

    // Try sprite first (PNGs point UP, so rotate -90° to face RIGHT)
    const _sprImg = Assets._cache[CFG.PLAYER_SPRITE];
    if (_sprImg && _sprImg._loaded) {
      // Underglow glow ring (no shadowBlur)
      const glowPulse = 0.3 + 0.15 * Math.sin(this.glowPhase * 2 * Math.PI / 1.2);
      ctx.fillStyle = CFG.C_ACCENT;
      ctx.globalAlpha *= (0.12 + glowPulse * 0.08) * (drifting ? 1.6 : 1);
      ctx.beginPath();
      ctx.arc(0, 0, (drifting ? 28 : 22), 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = this.invulnTimer > 0 && Math.floor(this.invulnTimer * 10) % 2 === 0 ? 0.4 : 1;
      ctx.globalAlpha *= (0.6 + glowPulse);
      ctx.rotate(Math.PI / 2); // PNG points UP → rotate to face RIGHT
      const sprS = CFG.PLAYER_SPRITE_S;
      ctx.drawImage(_sprImg, -sprS/2, -sprS/2, sprS, sprS);
      ctx.rotate(-Math.PI / 2); // restore rotation
      ctx.globalAlpha = 1;
    } else {
    // Underglow glow ring (no shadowBlur)
    const glowPulse = 0.3 + 0.15 * Math.sin(this.glowPhase * 2 * Math.PI / 1.2);
    ctx.fillStyle = CFG.C_ACCENT;
    ctx.globalAlpha *= (0.12 + glowPulse * 0.08) * (drifting ? 1.6 : 1);
    ctx.beginPath();
    ctx.arc(0, 0, (drifting ? 28 : 22), 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = this.invulnTimer > 0 && Math.floor(this.invulnTimer * 10) % 2 === 0 ? 0.4 : 1;
    ctx.globalAlpha *= (0.6 + glowPulse);

    // Body
    ctx.fillStyle = CFG.C_PLAYER;
    ctx.fillRect(-CFG.PLAYER_W/2, -CFG.PLAYER_H/2, CFG.PLAYER_W, CFG.PLAYER_H);

    ctx.globalAlpha = 1;

    // Outline
    ctx.strokeStyle = drifting ? CFG.C_ACCENT : '#888';
    ctx.lineWidth = drifting ? 2 : 1;
    ctx.strokeRect(-CFG.PLAYER_W/2, -CFG.PLAYER_H/2, CFG.PLAYER_W, CFG.PLAYER_H);

    // Windshield
    ctx.fillStyle = '#8AF';
    ctx.fillRect(CFG.PLAYER_W/2 - 8, -CFG.PLAYER_H/2 + 3, 5, CFG.PLAYER_H - 6);

    // Nose highlight
    ctx.fillStyle = CFG.C_ACCENT;
    ctx.beginPath();
    ctx.moveTo(CFG.PLAYER_W/2, 0);
    ctx.lineTo(CFG.PLAYER_W/2 - 6, -5);
    ctx.lineTo(CFG.PLAYER_W/2 - 6, 5);
    ctx.closePath();
    ctx.fill();

    // Rear lights
    ctx.fillStyle = this.braking ? '#FF4444' : '#AA2222';
    ctx.fillRect(-CFG.PLAYER_W/2, -CFG.PLAYER_H/2 + 2, 3, 3);
    ctx.fillRect(-CFG.PLAYER_W/2, CFG.PLAYER_H/2 - 5, 3, 3);

    // Exhaust flare
    if (this.exhaustTimer > 0) {
      ctx.fillStyle = CFG.C_PICKUP;
      ctx.globalAlpha = this.exhaustTimer / 0.06;
      ctx.beginPath();
      ctx.moveTo(-CFG.PLAYER_W/2, 0);
      ctx.lineTo(-CFG.PLAYER_W/2 - 12, -4);
      ctx.lineTo(-CFG.PLAYER_W/2 - 12, 4);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    } // end procedural fallback

    // Drift denied flash
    if (this.driftDeniedTimer > 0) {
      ctx.strokeStyle = CFG.C_PICKUP;
      ctx.lineWidth = 3;
      ctx.globalAlpha = this.driftDeniedTimer / 0.12;
      ctx.strokeRect(-CFG.PLAYER_W/2 - 2, -CFG.PLAYER_H/2 - 2, CFG.PLAYER_W + 4, CFG.PLAYER_H + 4);
      ctx.globalAlpha = 1;
    }

    // Shield indicator
    if (this.shield) {
      ctx.strokeStyle = CFG.C_SHIELD;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.5 + 0.3 * Math.sin(this.glowPhase * 4);
      ctx.beginPath();
      ctx.arc(0, 0, CFG.PLAYER_RADIUS + 6, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    ctx.restore();

    // Engine jitter (idle life)
    if (speed < 30) {
      // tiny jitter handled by glow pulse already
    }
  }
}

// ── 6. ENEMIES ──────────────────────────────────────────────
class Enemy {
  constructor(type, x, y) {
    this.type = type; // 'chaser', 'interceptor', 'drifter', 'elite'
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    this.heading = 0;
    this.drifting = false;
    this.driftJustStarted = false;
    this.slipTimer = 0;
    this.wallHit = false;
    this.alive = true;
    this.nearMissCooldown = 0;
    this.offscreenTimer = 0;
    this.driftToggleTimer = U.randFloat(2, 5);
    this.glowExtra = 0;
    this.age = 0;
    this.lifespan = U.randFloat(CFG.ENEMY_LIFESPAN_MIN, CFG.ENEMY_LIFESPAN_MAX);
    this.fadeAlpha = 1;
    this.baseMaxSpeed = 0; // set after maxSpeed is assigned
    this.health = 1;
    this.armored = false;
    this.sprite = CFG.ENEMY_SPRITES.length > 0 ? U.randChoice(CFG.ENEMY_SPRITES) : null;

    this.radius = CFG.ENEMY_RADIUS;
    if (type === 'elite') {
      this.maxSpeed = CFG.CHASER_SPEED * 0.9;
      this.turnRate = CFG.ENEMY_TURN_RATE * 0.8;
      this.health = 2;
      this.armored = true;
      this.radius = 14; // larger collision
      this.lifespan *= 1.5; // elites live longer
    } else if (type === 'chaser') { this.maxSpeed = CFG.CHASER_SPEED; this.turnRate = CFG.ENEMY_TURN_RATE; }
    else if (type === 'interceptor') { this.maxSpeed = CFG.INTERCEPTOR_SPEED; this.turnRate = CFG.ENEMY_TURN_RATE * 0.85; }
    else { this.maxSpeed = CFG.DRIFTER_SPEED; this.turnRate = CFG.ENEMY_TURN_RATE * 1.1; }
    this.baseMaxSpeed = this.maxSpeed;
  }

  update(dt, player) {
    if (!this.alive) return;

    // Target
    let tx = player.x, ty = player.y;
    if (this.type === 'interceptor') {
      // Lead the player
      const lookAhead = 0.5;
      tx += player.vx * lookAhead;
      ty += player.vy * lookAhead;
    }

    // Desired heading
    const desired = Math.atan2(ty - this.y, tx - this.x);
    const diff = U.angleDiff(this.heading, desired);
    let turnInput = U.clamp(diff * 3, -1, 1);

    // Drifter type: periodic drift toggles
    let wantDrift = false;
    if (this.type === 'drifter') {
      this.driftToggleTimer -= dt;
      if (this.driftToggleTimer <= 0) {
        this.driftToggleTimer = U.randFloat(1.5, 4);
        wantDrift = true;
      }
      if (this.drifting) wantDrift = true;
      // Release drift after a while
      if (this.drifting && this.driftToggleTimer > 2) wantDrift = false;
    }

    this.wallHit = false;
    this.driftJustStarted = false;
    updatePhysics(this, dt, turnInput, true, false, wantDrift, false);

    // Near miss cooldown
    if (this.nearMissCooldown > 0) this.nearMissCooldown -= dt;

    // Age / lifespan
    this.age += dt;
    if (this.age >= this.lifespan) {
      this.alive = false;
      // Fade-out poof particles
      Particles.spawn(this.x, this.y, '#666', 6, {
        vxMin: -60, vxMax: 60, vyMin: -60, vyMax: 60,
        lifeMin: 0.3, lifeMax: 0.5, sizeMin: 3, sizeMax: 6, type: 'smoke',
      });
      return;
    }
    // Fade alpha when nearing end of lifespan (last 2 seconds)
    this.fadeAlpha = this.lifespan - this.age < 2 ? (this.lifespan - this.age) / 2 : 1;

    // Off-screen behavior: boost speed for catch-up, despawn if too far/too long
    const onScreen = Camera.isVisible(this.x, this.y, 40);
    if (!onScreen) {
      this.offscreenTimer += dt;
      this.maxSpeed = this.baseMaxSpeed * CFG.ENEMY_OFFSCREEN_BOOST;
      if (this.offscreenTimer > CFG.ENEMY_OFFSCREEN_DESPAWN) { this.alive = false; return; }
      if (U.dist(this.x, this.y, player.x, player.y) > CFG.ENEMY_FAR_DESPAWN_DIST) { this.alive = false; return; }
    } else {
      this.offscreenTimer = 0;
      this.maxSpeed = this.baseMaxSpeed;
    }
  }

  render(ctx, time) {
    if (!this.alive) return;

    const isElite = this.type === 'elite';
    const ew = isElite ? 40 : CFG.ENEMY_W;
    const eh = isElite ? 20 : CFG.ENEMY_H;

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.heading);

    // Fade when nearing lifespan end
    if (this.fadeAlpha !== undefined && this.fadeAlpha < 1) {
      ctx.globalAlpha = Math.max(0.15, this.fadeAlpha);
    }

    // Elite: pulsing aura (no shadowBlur)
    if (isElite) {
      const auraPulse = 0.3 + 0.2 * Math.sin((time || 0) * 4);
      const auraColor = this.armored ? CFG.C_RARE : CFG.C_ENEMY;
      // Outer aura circle
      ctx.globalAlpha *= (0.15 + auraPulse * 0.1);
      ctx.fillStyle = auraColor;
      ctx.beginPath();
      ctx.arc(0, 0, 28, 0, Math.PI * 2);
      ctx.fill();
      // Softer glow ring
      ctx.globalAlpha = (0.08 + auraPulse * 0.06);
      ctx.beginPath();
      ctx.arc(0, 0, 34 + this.glowExtra * 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = this.fadeAlpha !== undefined ? Math.max(0.15, this.fadeAlpha) : 1;
    }

    // Danger aura (colored outline instead of shadowBlur)
    const auraColor = isElite ? (this.armored ? CFG.C_RARE : CFG.C_ENEMY) : CFG.C_ENEMY;

    // Try sprite first (PNGs point UP → rotate +90° to face RIGHT)
    const _eImg = this.sprite ? Assets._cache[this.sprite] : null;
    if (_eImg && _eImg._loaded) {
      ctx.rotate(Math.PI / 2);
      const eSprS = isElite ? CFG.ENEMY_SPRITE_S * 1.25 : CFG.ENEMY_SPRITE_S;
      ctx.drawImage(_eImg, -eSprS/2, -eSprS/2, eSprS, eSprS);
      ctx.rotate(-Math.PI / 2);
      // Colored outline glow (replaces shadowBlur)
      ctx.strokeStyle = auraColor;
      ctx.lineWidth = 2;
      ctx.globalAlpha *= 0.4;
      ctx.strokeRect(-ew/2 - 2, -eh/2 - 2, ew + 4, eh + 4);
      ctx.globalAlpha = this.fadeAlpha !== undefined ? Math.max(0.15, this.fadeAlpha) : 1;
    } else {
    // Body
    ctx.fillStyle = isElite ? (this.armored ? '#2A1A4A' : CFG.C_ENEMY_DARK) : CFG.C_ENEMY_DARK;
    ctx.fillRect(-ew/2, -eh/2, ew, eh);
    ctx.strokeStyle = isElite ? (this.armored ? CFG.C_RARE : CFG.C_ENEMY) : CFG.C_ENEMY;
    ctx.lineWidth = isElite ? 2.5 : 1.5;
    ctx.strokeRect(-ew/2, -eh/2, ew, eh);

    // Armor indicator on elite
    if (isElite && this.armored) {
      ctx.strokeStyle = CFG.C_RARE;
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.5;
      ctx.strokeRect(-ew/2 + 3, -eh/2 + 3, ew - 6, eh - 6);
      ctx.globalAlpha = 1;
    }

    // Headlight wedge
    ctx.fillStyle = CFG.C_TEXT;
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.moveTo(ew/2, -2);
    ctx.lineTo(ew/2 + 10, -8);
    ctx.lineTo(ew/2 + 10, 8);
    ctx.lineTo(ew/2, 2);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
    } // end procedural fallback

    ctx.restore();
  }
}

// ── 7. PROPS SYSTEM ────────────────────────────────────────
const Props = {
  chunks: {},   // key: 'cx,cy' -> array of prop objects
  allProps: [], // flat list for collision checks
  weightedPool: [],

  _seededRandom(seed) {
    // mulberry32
    return function() {
      seed |= 0; seed = seed + 0x6D2B79F5 | 0;
      let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  },

  reset() {
    this.chunks = {};
    this.allProps = [];
    // Build weighted pool
    this.weightedPool = [];
    for (const p of CFG.PROP_POOL) {
      for (let i = 0; i < p.weight; i++) this.weightedPool.push(p);
    }
  },

  generate() {
    const cs = CFG.PROP_CHUNK_SIZE;
    const chunksX = Math.ceil(CFG.WORLD_W / cs);
    const chunksY = Math.ceil(CFG.WORLD_H / cs);
    const centerX = CFG.WORLD_W / 2, centerY = CFG.WORLD_H / 2;

    for (let cx = 0; cx < chunksX; cx++) {
      for (let cy = 0; cy < chunksY; cy++) {
        this._generateChunk(cx, cy, centerX, centerY);
      }
    }
  },

  _generateChunk(cx, cy, centerX, centerY) {
    const cs = CFG.PROP_CHUNK_SIZE;
    const seed = cx * 7919 + cy * 104729;
    const rng = this._seededRandom(seed);
    const area = cs * cs;
    const count = Math.floor(area * CFG.PROP_DENSITY);
    const key = cx + ',' + cy;
    const props = [];

    for (let i = 0; i < count; i++) {
      const x = cx * cs + rng() * cs;
      const y = cy * cs + rng() * cs;

      // Skip props too close to center spawn
      const dx = x - centerX, dy = y - centerY;
      if (dx * dx + dy * dy < CFG.PROP_MIN_DIST * CFG.PROP_MIN_DIST) continue;

      // Skip props outside world bounds (with padding)
      if (x < 40 || x > CFG.WORLD_W - 40 || y < 40 || y > CFG.WORLD_H - 40) continue;

      const template = this.weightedPool[Math.floor(rng() * this.weightedPool.length)];
      const prop = {
        x, y,
        radius: template.radius,
        type: template.type,
        image: template.image,
        duration: template.duration || 0,
        strength: template.strength || 0,
        alive: true,
      };
      props.push(prop);
      this.allProps.push(prop);
    }
    this.chunks[key] = props;
  },

  checkPlayerCollision(player) {
    const hits = [];
    const pr = player.radius;
    for (const prop of this.allProps) {
      if (!prop.alive || prop.type === 'decoration') continue;
      const dx = player.x - prop.x, dy = player.y - prop.y;
      const dist = dx * dx + dy * dy;
      const minDist = pr + prop.radius;
      if (dist < minDist * minDist) {
        hits.push(prop);
      }
    }
    return hits;
  },

  handleCollisions(player, hits) {
    for (const prop of hits) {
      if (prop.type === 'solid') {
        // Push player out and bounce
        const dx = player.x - prop.x, dy = player.y - prop.y;
        const dist = Math.hypot(dx, dy) || 1;
        const overlap = player.radius + prop.radius - dist;
        const nx = dx / dist, ny = dy / dist;
        player.x += nx * overlap;
        player.y += ny * overlap;
        // Reflect velocity
        const dot = player.vx * nx + player.vy * ny;
        if (dot < 0) {
          player.vx -= dot * nx;
          player.vy -= dot * ny;
          player.vx *= 0.3;
          player.vy *= 0.3;
        }
        // Spark FX
        Particles.spawn(prop.x + nx * prop.radius, prop.y + ny * prop.radius, CFG.C_PICKUP, 4, {
          vxMin: -60, vxMax: 60, vyMin: -60, vyMax: 60,
          lifeMin: 0.15, lifeMax: 0.3, sizeMin: 2, sizeMax: 4, type: 'spark',
        });
      } else if (prop.type === 'slow') {
        player.slowTimer = prop.duration;
        player.slowStrength = prop.strength;
      } else if (prop.type === 'slip') {
        player.slipTimer = prop.duration;
      }
    }
  },

  checkEnemyCollision(enemies) {
    for (const e of enemies) {
      if (!e.alive) continue;
      const er = e.radius || CFG.ENEMY_RADIUS;
      for (const prop of this.allProps) {
        if (!prop.alive || prop.type !== 'solid') continue;
        const dx = e.x - prop.x, dy = e.y - prop.y;
        const dist2 = dx * dx + dy * dy;
        const minDist = er + prop.radius;
        if (dist2 < minDist * minDist) {
          const dist = Math.sqrt(dist2) || 1;
          const overlap = minDist - dist;
          const nx = dx / dist, ny = dy / dist;
          e.x += nx * overlap;
          e.y += ny * overlap;
          const dot = e.vx * nx + e.vy * ny;
          if (dot < 0) {
            e.vx -= dot * nx;
            e.vy -= dot * ny;
            e.vx *= 0.4;
            e.vy *= 0.4;
          }
        }
      }
    }
  },

  render(ctx) {
    for (const prop of this.allProps) {
      if (!prop.alive) continue;
      if (!Camera.isVisible(prop.x, prop.y, prop.radius * 2 + 10)) continue;

      // Glow highlight behind prop (pre-rendered)
      const glowKey = prop.radius + '_' + prop.type;
      const glowData = FXCache.propGlow[glowKey];
      if (glowData) {
        const half = glowData.size / 2;
        ctx.drawImage(glowData.canvas, prop.x - half, prop.y - half);
      }

      const drawn = Assets.drawOrFallback(ctx, prop.image, prop.x, prop.y, prop.radius * 2, prop.radius * 2, () => {
        ctx.beginPath();
        ctx.arc(prop.x, prop.y, prop.radius, 0, Math.PI * 2);

        if (prop.type === 'solid') {
          ctx.fillStyle = '#1A3322';
          ctx.fill();
          ctx.strokeStyle = '#0F2218';
          ctx.lineWidth = 1.5;
          ctx.stroke();
        } else if (prop.type === 'slow') {
          ctx.fillStyle = '#3D2810';
          ctx.fill();
          ctx.strokeStyle = '#2A1A08';
          ctx.lineWidth = 1;
          ctx.stroke();
        } else if (prop.type === 'slip') {
          ctx.fillStyle = 'rgba(30,60,100,0.5)';
          ctx.fill();
        } else {
          // decoration
          ctx.fillStyle = 'rgba(26,58,26,0.4)';
          ctx.fill();
        }
      });
    }
  },
};

// ── 8. PARTICLES / FX ──────────────────────────────────────
const Particles = {
  list: [],
  skidMarks: [],
  _skidHead: 0,  // ring buffer write index
  MAX_SKIDS: 600,
  floatingTexts: [],
  rings: [],

  clear() {
    this.list = [];
    this.skidMarks = [];
    this._skidHead = 0;
    this.floatingTexts = [];
    this.rings = [];
  },

  spawn(x, y, color, count, opts = {}) {
    for (let i = 0; i < count; i++) {
      this.list.push({
        x, y, color,
        vx: U.randFloat(opts.vxMin || -100, opts.vxMax || 100),
        vy: U.randFloat(opts.vyMin || -100, opts.vyMax || 100),
        life: U.randFloat(opts.lifeMin || 0.3, opts.lifeMax || 0.8),
        maxLife: U.randFloat(opts.lifeMin || 0.3, opts.lifeMax || 0.8),
        size: U.randFloat(opts.sizeMin || 2, opts.sizeMax || 5),
        type: opts.type || 'spark',
      });
    }
  },

  addSkid(x, y, color, alpha) {
    const entry = { x, y, color, alpha, age: 0 };
    if (this.skidMarks.length < this.MAX_SKIDS) {
      this.skidMarks.push(entry);
    } else {
      this.skidMarks[this._skidHead] = entry;
      this._skidHead = (this._skidHead + 1) % this.MAX_SKIDS;
    }
  },

  addFloat(x, y, text, color, size) {
    this.floatingTexts.push({ x, y, text, color, size: size || 16, life: 0.6, vy: -45 });
  },

  addRing(x, y, color) {
    this.rings.push({ x, y, color, radius: 0, maxRadius: 80, life: 0.3 });
  },

  update(dt) {
    // Particles (swap-and-pop)
    for (let i = this.list.length - 1; i >= 0; i--) {
      const p = this.list[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      if (p.type === 'smoke') {
        p.vx *= 0.95; p.vy *= 0.95;
        p.size += dt * 8;
      }
      p.life -= dt;
      if (p.life <= 0) { this.list[i] = this.list[this.list.length - 1]; this.list.pop(); }
    }

    // Skid marks fade (ring buffer — old marks overwritten automatically)
    for (let i = this.skidMarks.length - 1; i >= 0; i--) {
      this.skidMarks[i].age += dt;
    }

    // Floating texts (swap-and-pop)
    for (let i = this.floatingTexts.length - 1; i >= 0; i--) {
      const ft = this.floatingTexts[i];
      ft.y += ft.vy * dt;
      ft.life -= dt;
      if (ft.life <= 0) { this.floatingTexts[i] = this.floatingTexts[this.floatingTexts.length - 1]; this.floatingTexts.pop(); }
    }

    // Rings (swap-and-pop)
    for (let i = this.rings.length - 1; i >= 0; i--) {
      const r = this.rings[i];
      r.radius += (r.maxRadius / 0.3) * dt;
      r.life -= dt;
      if (r.life <= 0) { this.rings[i] = this.rings[this.rings.length - 1]; this.rings.pop(); }
    }
  },

  renderSkids(ctx) {
    for (const s of this.skidMarks) {
      if (s.age > 6) continue;
      if (!Camera.isVisible(s.x, s.y, 3)) continue;
      const alpha = Math.max(0, s.alpha * (1 - s.age / 6));
      if (alpha < 0.01) continue;
      ctx.fillStyle = s.color;
      ctx.globalAlpha = alpha;
      ctx.fillRect(s.x - 1.5, s.y - 1.5, 3, 3);
    }
    ctx.globalAlpha = 1;
  },

  renderParticles(ctx) {
    for (const p of this.list) {
      const alpha = p.life / p.maxLife;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      if (p.type === 'smoke') {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.type === 'shard') {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.life * 10);
        ctx.beginPath();
        ctx.moveTo(0, -p.size);
        ctx.lineTo(p.size * 0.7, p.size * 0.5);
        ctx.lineTo(-p.size * 0.7, p.size * 0.5);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      } else {
        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
      }
    }
    ctx.globalAlpha = 1;
  },

  renderFloats(ctx) {
    for (const ft of this.floatingTexts) {
      ctx.globalAlpha = U.clamp(ft.life / 0.3, 0, 1);
      U.text(ctx, ft.text, ft.x, ft.y, { color: ft.color, size: ft.size, align: 'center', bold: true, shadow: true });
    }
    ctx.globalAlpha = 1;
  },

  renderRings(ctx) {
    for (const r of this.rings) {
      ctx.globalAlpha = r.life / 0.3;
      ctx.strokeStyle = r.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  },
};

// ── 9. SCREEN FX ────────────────────────────────────────────
const ScreenFX = {
  shakeIntensity: 0,
  shakeDuration: 0,
  shakeTimer: 0,
  flashColor: null,
  flashAlpha: 0,
  flashTimer: 0,
  zoomPulse: 1,
  zoomTarget: 1,
  zoomTimer: 0,
  timeDilation: 1,
  timeTarget: 1,
  timeTimer: 0,
  desatAmount: 0,
  desatTarget: 0,
  freezeTimer: 0,

  shake(intensity, dur) {
    this.shakeIntensity = intensity;
    this.shakeDuration = dur;
    this.shakeTimer = dur;
  },

  flash(color, alpha, dur) {
    this.flashColor = color;
    this.flashAlpha = alpha;
    this.flashTimer = dur;
  },

  zoom(target, dur) {
    this.zoomTarget = target;
    this.zoomTimer = dur;
  },

  slowmo(factor, dur) {
    this.timeDilation = factor;
    this.timeTimer = dur;
  },

  freeze(dur) {
    this.freezeTimer = dur;
  },

  desaturate(target) {
    this.desatTarget = target;
  },

  reset() {
    this.shakeTimer = 0; this.flashTimer = 0; this.zoomPulse = 1;
    this.zoomTarget = 1; this.zoomTimer = 0;
    this.timeDilation = 1; this.timeTarget = 1; this.timeTimer = 0;
    this.desatAmount = 0; this.desatTarget = 0;
    this.freezeTimer = 0;
  },

  update(rawDt) {
    if (this.freezeTimer > 0) { this.freezeTimer -= rawDt; return 0; }

    if (this.shakeTimer > 0) this.shakeTimer -= rawDt;

    if (this.flashTimer > 0) this.flashTimer -= rawDt;

    if (this.zoomTimer > 0) {
      this.zoomPulse = U.lerp(this.zoomPulse, this.zoomTarget, 0.15);
      this.zoomTimer -= rawDt;
    } else {
      this.zoomPulse = U.lerp(this.zoomPulse, 1, 0.15);
    }

    if (this.timeTimer > 0) {
      this.timeTimer -= rawDt;
    } else {
      this.timeDilation = U.lerp(this.timeDilation, 1, 0.1);
    }

    this.desatAmount = U.lerp(this.desatAmount, this.desatTarget, 0.05);

    return rawDt * this.timeDilation;
  },

  applyPre(ctx) {
    // Shake
    let ox = 0, oy = 0;
    if (this.shakeTimer > 0) {
      const frac = this.shakeTimer / this.shakeDuration;
      const mag = this.shakeIntensity * frac;
      ox = U.randFloat(-mag, mag);
      oy = U.randFloat(-mag, mag);
    }

    ctx.save();
    ctx.translate(CFG.W/2, CFG.H/2);
    ctx.scale(this.zoomPulse, this.zoomPulse);
    ctx.translate(-CFG.W/2 + ox, -CFG.H/2 + oy);
  },

  applyPost(ctx) {
    ctx.restore();

    // Flash overlay
    if (this.flashTimer > 0 && this.flashColor) {
      ctx.fillStyle = this.flashColor;
      ctx.globalAlpha = this.flashAlpha * (this.flashTimer > 0 ? 1 : 0);
      ctx.fillRect(0, 0, CFG.W, CFG.H);
      ctx.globalAlpha = 1;
    }

    // Desaturation overlay
    if (this.desatAmount > 0.01) {
      ctx.fillStyle = CFG.C_PANEL;
      ctx.globalAlpha = this.desatAmount;
      ctx.fillRect(0, 0, CFG.W, CFG.H);
      ctx.globalAlpha = 1;
    }
  },
};

// ── 9b. CAMERA ──────────────────────────────────────────────
const Camera = {
  x: 0, y: 0,
  targetX: 0, targetY: 0,
  zoom: 1,

  update(dt, px, py, pvx, pvy, pSpeed) {
    // Camera lead: offset target in direction of travel
    const leadAmount = 40;
    const spd = pSpeed || 0;
    const leadFrac = U.clamp(spd / (CFG.MAX_SPEED * 0.8), 0, 1);
    const lvx = pvx || 0, lvy = pvy || 0;
    const lspd = Math.hypot(lvx, lvy) || 1;
    this.targetX = px + (lvx / lspd) * leadAmount * leadFrac;
    this.targetY = py + (lvy / lspd) * leadAmount * leadFrac;

    const speed = 6;
    const t = 1 - Math.exp(-speed * dt);
    this.x = U.lerp(this.x, this.targetX, t);
    this.y = U.lerp(this.y, this.targetY, t);
    // Clamp so viewport stays inside world
    this.x = U.clamp(this.x, CFG.W / 2, CFG.WORLD_W - CFG.W / 2);
    this.y = U.clamp(this.y, CFG.H / 2, CFG.WORLD_H - CFG.H / 2);

    // Dynamic zoom: slight zoom-out at high speed
    const targetZoom = 1 - leadFrac * 0.04; // up to 4% zoom-out
    this.zoom = U.lerp(this.zoom, targetZoom, t);
  },

  isVisible(wx, wy, margin) {
    margin = margin || 0;
    const sx = wx - this.x + CFG.W / 2;
    const sy = wy - this.y + CFG.H / 2;
    return sx >= -margin && sx <= CFG.W + margin && sy >= -margin && sy <= CFG.H + margin;
  },

  reset(px, py) {
    this.x = U.clamp(px, CFG.W / 2, CFG.WORLD_W - CFG.W / 2);
    this.y = U.clamp(py, CFG.H / 2, CFG.WORLD_H - CFG.H / 2);
    this.targetX = this.x;
    this.targetY = this.y;
    this.zoom = 1;
  },
};

// ── 9c. TRAIL (Encirclement) ────────────────────────────────
const Trail = {
  points: [],        // ring buffer of {x, y}
  MAX_POINTS: 400,
  head: 0,
  count: 0,
  recordTimer: 0,
  RECORD_INTERVAL: 0.05,
  checkTimer: 0,
  CHECK_INTERVAL: 0.15,
  CLOSE_DIST: 40,
  SKIP_RECENT: 20,

  reset() {
    this.points = [];
    this.head = 0;
    this.count = 0;
    this.recordTimer = 0;
    this.checkTimer = 0;
    this._flashPoly = null;
    this._flashPolyTimer = 0;
  },

  push(x, y) {
    if (this.count < this.MAX_POINTS) {
      this.points.push({ x, y });
      this.count++;
    } else {
      this.points[this.head] = { x, y };
    }
    this.head = (this.head + 1) % this.MAX_POINTS;
  },

  getPoint(i) {
    // i=0 is oldest, i=count-1 is newest
    if (this.count < this.MAX_POINTS) return this.points[i];
    return this.points[(this.head + i) % this.MAX_POINTS];
  },

  update(dt, player) {
    this._lastDt = dt;
    this._lastPlayerX = player.x;
    this._lastPlayerY = player.y;
    this.recordTimer -= dt;
    if (this.recordTimer <= 0) {
      this.push(player.x, player.y);
      this.recordTimer = this.RECORD_INTERVAL;
    }
    // Flash polygon timer
    if (this._flashPolyTimer > 0) this._flashPolyTimer -= dt;
  },

  checkLoop(player, enemies, game) {
    this.checkTimer -= this._lastDt || 0;
    if (this.checkTimer > 0) return;
    this.checkTimer = this.CHECK_INTERVAL;

    if (this.count < this.SKIP_RECENT + 5) return;

    const px = player.x, py = player.y;
    const searchEnd = this.count - this.SKIP_RECENT;

    for (let i = 0; i < searchEnd; i++) {
      const pt = this.getPoint(i);
      const d = Math.hypot(px - pt.x, py - pt.y);
      if (d < this.CLOSE_DIST) {
        // Found a loop: extract polygon from point i to current position
        const poly = [];
        for (let j = i; j < this.count; j++) {
          const p = this.getPoint(j);
          poly.push(p);
        }
        poly.push({ x: px, y: py });

        if (poly.length < 10) continue; // too small

        // Check which enemies are inside
        // Compute loop centroid for shockwave
        let cxSum = 0, cySum = 0;
        for (const p of poly) { cxSum += p.x; cySum += p.y; }
        const loopCX = cxSum / poly.length, loopCY = cySum / poly.length;

        let killCount = 0;
        for (const e of enemies) {
          if (!e.alive) continue;
          if (this._pointInPoly(e.x, e.y, poly)) {
            // Elite enemies: strip armor first, then kill
            if (e.health > 1) {
              e.health--;
              e.armored = false;
              // Armor strip FX
              Particles.spawn(e.x, e.y, CFG.C_RARE, 10, {
                vxMin: -150, vxMax: 150, vyMin: -150, vyMax: 150,
                lifeMin: 0.3, lifeMax: 0.6, sizeMin: 3, sizeMax: 6, type: 'shard',
              });
              Particles.addRing(e.x, e.y, CFG.C_RARE);
              Particles.addFloat(e.x, e.y - 25, 'ARMOR BROKEN!', CFG.C_RARE, 16);
              ScreenFX.shake(4, 0.15);
              continue;
            }
            e.alive = false;
            const isElite = e.type === 'elite';
            killCount += isElite ? 3 : 1; // Elite worth 3x
            // Enhanced kill FX: red-to-white flash shards spinning outward
            const dirFromCenter = Math.atan2(e.y - loopCY, e.x - loopCX);
            Particles.spawn(e.x, e.y, '#FF6688', isElite ? 12 : 6, {
              vxMin: -200, vxMax: 200, vyMin: -200, vyMax: 200,
              lifeMin: 0.3, lifeMax: 0.7, sizeMin: 4, sizeMax: isElite ? 14 : 10, type: 'shard',
            });
            Particles.spawn(e.x, e.y, '#fff', 5, {
              vxMin: Math.cos(dirFromCenter) * 100, vxMax: Math.cos(dirFromCenter) * 250,
              vyMin: Math.sin(dirFromCenter) * 100, vyMax: Math.sin(dirFromCenter) * 250,
              lifeMin: 0.2, lifeMax: 0.5, sizeMin: 3, sizeMax: 7, type: 'shard',
            });
            Particles.addRing(e.x, e.y, CFG.C_ACCENT);
            if (isElite) Particles.addRing(e.x, e.y, CFG.C_RARE); // Extra ring for elite
          }
        }

        if (killCount > 0) {
          const comboMult = Math.max(1, Math.floor(player.comboLevel + 1));
          const baseScore = 100 * killCount;
          const bonus = killCount >= 2 ? 50 * killCount : 0;
          const encircleBonus = player.encircleScoreBonus || 1;
          const total = Math.floor((baseScore + bonus) * comboMult * encircleBonus);
          game.score += total * player.scoreMult;
          // Award combo levels for encirclement
          player.comboLevel = Math.min(CFG.MAX_COMBO, player.comboLevel + 2 * killCount);
          game.encircleCount += killCount;
          const label = killCount >= 2 ? `ENCIRCLE x${killCount}! +${total}` : `ENCIRCLE! +${total}`;
          Particles.addFloat(px, py - 40, label, CFG.C_ACCENT, 18);
          // Flash the enclosed polygon briefly
          this._flashPoly = poly.slice();
          this._flashPolyTimer = 0.3;
          // Shockwave ring from loop centroid
          Particles.rings.push({ x: loopCX, y: loopCY, color: CFG.C_ACCENT, radius: 0, maxRadius: 150, life: 0.5 });
          ScreenFX.flash(CFG.C_ACCENT, 0.15, 0.12);
          ScreenFX.shake(5, 0.2);

          // Clear trail after successful encirclement
          this.points = [];
          this.head = 0;
          this.count = 0;
          return;
        }
        break; // only check first matching loop
      }
    }
  },

  _pointInPoly(x, y, poly) {
    let inside = false;
    for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
      const xi = poly[i].x, yi = poly[i].y;
      const xj = poly[j].x, yj = poly[j].y;
      if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) {
        inside = !inside;
      }
    }
    return inside;
  },

  render(ctx) {
    if (this.count < 2) return;

    // Check if loop is about to close (for glow pulse)
    let nearLoop = false;
    if (this.count > this.SKIP_RECENT + 5 && this._lastPlayerX !== undefined) {
      const searchEnd = this.count - this.SKIP_RECENT;
      for (let i = 0; i < searchEnd; i++) {
        const pt = this.getPoint(i);
        if (Math.hypot(this._lastPlayerX - pt.x, this._lastPlayerY - pt.y) < 80) {
          nearLoop = true; break;
        }
      }
    }

    // Trail with color gradient: dim oldest -> bright cyan newest
    ctx.save();
    ctx.lineCap = 'round';
    const trailW = nearLoop ? 3.5 : 2.5;

    // Glow underlay: thicker, semi-transparent pass (no shadowBlur)
    ctx.lineWidth = trailW + (nearLoop ? 8 : 5);
    for (let i = 1; i < this.count; i++) {
      const frac = i / this.count;
      const glowAlpha = (0.02 + frac * 0.08) * (nearLoop ? 1.4 : 1);
      ctx.strokeStyle = `rgba(53,242,208,${glowAlpha})`;
      ctx.beginPath();
      const p0 = this.getPoint(i - 1);
      const p1 = this.getPoint(i);
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.stroke();
    }

    // Sharp trail on top
    ctx.lineWidth = trailW;
    for (let i = 1; i < this.count; i++) {
      const frac = i / this.count;
      const alphaBoost = nearLoop ? 0.15 : 0;
      const alpha = 0.08 + frac * 0.30 + alphaBoost;
      const r = Math.round(53 + frac * (53 - 53));
      const g = Math.round(100 + frac * (242 - 100));
      const b = Math.round(140 + frac * (208 - 140));
      ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
      ctx.beginPath();
      const p0 = this.getPoint(i - 1);
      const p1 = this.getPoint(i);
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.stroke();
    }
    ctx.restore();

    // Flash polygon from encirclement kill
    if (this._flashPoly && this._flashPolyTimer > 0) {
      ctx.save();
      ctx.globalAlpha = (this._flashPolyTimer / 0.3) * 0.25;
      ctx.fillStyle = CFG.C_ACCENT;
      ctx.beginPath();
      ctx.moveTo(this._flashPoly[0].x, this._flashPoly[0].y);
      for (let i = 1; i < this._flashPoly.length; i++) {
        ctx.lineTo(this._flashPoly[i].x, this._flashPoly[i].y);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    // Loop-closing preview: dashed line when near an older trail point
    if (this.count > this.SKIP_RECENT + 5) {
      const px = this._lastPlayerX, py = this._lastPlayerY;
      if (px !== undefined) {
        const previewDist = 80;
        const searchEnd = this.count - this.SKIP_RECENT;
        for (let i = 0; i < searchEnd; i++) {
          const pt = this.getPoint(i);
          const d = Math.hypot(px - pt.x, py - pt.y);
          if (d < previewDist) {
            const closeness = 1 - d / previewDist; // 1=very close, 0=at edge
            ctx.save();
            ctx.strokeStyle = CFG.C_ACCENT;
            ctx.globalAlpha = 0.3 + closeness * 0.4;
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 4]);
            ctx.beginPath();
            ctx.moveTo(px, py);
            ctx.lineTo(pt.x, pt.y);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
            break;
          }
        }
      }
    }
  },
};

// ── 10. WAVE MANAGER ────────────────────────────────────────
const Waves = {
  waveIndex: 0,
  waveTimer: 0,
  phase: 'combat', // 'combat' | 'break'
  spawnTimer: 0,
  burstTimer: 0,
  breakTimer: 0,
  enemies: [],
  scraps: [],
  scrapTimer: 0,
  boostZones: [],
  boostZoneTimer: 0,
  upgradeCards: [],
  upgradeChosen: false,
  cadenceMult: 1,

  reset() {
    this.waveIndex = 0;
    this.waveTimer = 0;
    this.phase = 'combat';
    this.spawnTimer = CFG.FIRST_SPAWN_INITIAL;
    this.burstTimer = CFG.BURST_INTERVAL;
    this.breakTimer = 0;
    this.enemies = [];
    this.scraps = [];
    this.scrapTimer = CFG.SCRAP_INTERVAL;
    this.boostZones = [];
    this.boostZoneTimer = CFG.BOOST_ZONE_SPAWN_INTERVAL;
    this.upgradeCards = [];
    this.upgradeChosen = false;
    this.cadenceMult = 1;
    this._burstQueue = [];
    this.currentFirstSpawn = CFG.FIRST_SPAWN_INITIAL;
    this.currentSpawnInterval = CFG.SPAWN_INTERVAL_INITIAL;
    this.currentCombatDuration = CFG.WAVE_COMBAT;
    this.noBursts = false;
  },

  startWave(player) {
    this.waveIndex++;
    this.waveTimer = 0;
    this.phase = 'combat';
    this.enemies = [];
    this.upgradeChosen = false;

    // Wave-specific timing ramp: wave 1 is easiest, fully ramped by wave 5
    const ramp = Math.min(1, (this.waveIndex - 1) / 4);
    this.currentFirstSpawn = U.lerp(CFG.FIRST_SPAWN_INITIAL, CFG.FIRST_SPAWN_MIN, ramp);
    this.currentSpawnInterval = U.lerp(CFG.SPAWN_INTERVAL_INITIAL, CFG.SPAWN_INTERVAL_MIN, ramp);
    this.currentCombatDuration = this.waveIndex === 1 ? CFG.WAVE_COMBAT_WAVE1 : CFG.WAVE_COMBAT;
    this.noBursts = this.waveIndex === 1;

    this.spawnTimer = this.currentFirstSpawn;
    this.burstTimer = CFG.BURST_INTERVAL;

  },

  getEnemyType(score) {
    const pool = ['chaser'];
    if (score >= 1000) pool.push('interceptor');
    if (score >= 1500) pool.push('drifter');
    // Elite: rare spawn from wave 4+
    if (this.waveIndex >= 4 && Math.random() < 0.12) return 'elite';
    return U.randChoice(pool);
  },

  spawnEnemy(score, speedBonus, player) {
    // Spawn at random angle around player, ~550px away (just off-screen)
    const angle = U.randFloat(0, Math.PI * 2);
    const dist = 550;
    let x = player.x + Math.cos(angle) * dist;
    let y = player.y + Math.sin(angle) * dist;
    // Clamp to world
    x = U.clamp(x, 10, CFG.WORLD_W - 10);
    y = U.clamp(y, 10, CFG.WORLD_H - 10);

    const type = this.getEnemyType(score);
    const e = new Enemy(type, x, y);
    e.heading = Math.atan2(player.y - y, player.x - x);
    // Speed scaling at 2000+
    e.maxSpeed += speedBonus;
    e.baseMaxSpeed = e.maxSpeed;
    this.enemies.push(e);
  },

  update(dt, player, score, game) {
    if (this.phase === 'combat') {
      this.waveTimer += dt;

      // Enemy spawning
      this.spawnTimer -= dt;
      if (this.spawnTimer <= 0) {
        this.spawnEnemy(score, game.speedBonus, player);
        this.spawnTimer = this.currentSpawnInterval * this.cadenceMult;
      }

      // Burst spawning (disabled wave 1)
      if (!this.noBursts) {
        this.burstTimer -= dt;
        if (this.burstTimer <= 0) {
          // Queue burst spawns using internal timers instead of setTimeout
          for (let i = 0; i < CFG.BURST_COUNT; i++) {
            this._burstQueue.push({ delay: i * CFG.BURST_DELAY, score, speedBonus: game.speedBonus, player });
          }
          this.burstTimer = CFG.BURST_INTERVAL;
        }
      }
      // Process burst queue
      for (let i = this._burstQueue.length - 1; i >= 0; i--) {
        this._burstQueue[i].delay -= dt;
        if (this._burstQueue[i].delay <= 0) {
          const b = this._burstQueue.splice(i, 1)[0];
          if (this.phase === 'combat') this.spawnEnemy(b.score, b.speedBonus, b.player);
        }
      }

      // Wave end
      if (this.waveTimer >= this.currentCombatDuration) {
        this.phase = 'break';
        this.breakTimer = CFG.WAVE_BREAK;
        this.enemies = [];
        // Build upgrade offer
        this.upgradeCards = game.buildUpgradeOffer();
        this.upgradeChosen = false;
      }
    } else if (this.phase === 'break') {
      this.breakTimer -= dt;
      if (this.breakTimer <= 0 || this.upgradeChosen) {
        if (!this.upgradeChosen && this.upgradeCards.length > 0) {
          // Auto-pick random
          game.applyUpgrade(this.upgradeCards[U.randInt(0, this.upgradeCards.length - 1)]);
          this.upgradeChosen = true;
        }
        this.startWave(player);
      }
    }

    // Update enemies
    for (const e of this.enemies) {
      e.update(dt, player);
    }
    this.enemies = this.enemies.filter(e => e.alive);

    // Scrap spawning
    this.scrapTimer -= dt;
    if (this.scrapTimer <= 0 && this.phase === 'combat') {
      const angle = U.randFloat(0, Math.PI * 2);
      const dist = U.randFloat(220, 340);
      // Pickup type selection
      let pickupType = 'scrap';
      const roll = Math.random();
      if (this.waveIndex >= 5 && roll < 0.04) pickupType = 'bomb'; // very rare, wave 5+
      else if (roll < 0.12) pickupType = 'trail_boost';
      else if (roll < 0.20) pickupType = 'speed_pickup';
      this.scraps.push({
        x: U.clamp(player.x + Math.cos(angle) * dist, 40, CFG.WORLD_W - 40),
        y: U.clamp(player.y + Math.sin(angle) * dist, 40, CFG.WORLD_H - 40),
        life: 15, bobPhase: U.randFloat(0, Math.PI * 2),
        type: pickupType,
      });
      this.scrapTimer = CFG.SCRAP_INTERVAL;
    }

    // Update scraps
    for (let i = this.scraps.length - 1; i >= 0; i--) {
      const s = this.scraps[i];
      s.life -= dt;
      s.bobPhase += dt * 3;
      // Magnet
      if (player.magnetRange > 0) {
        const d = U.dist(s.x, s.y, player.x, player.y);
        if (d < player.magnetRange) {
          const pull = 200 * dt / Math.max(d, 1);
          s.x += (player.x - s.x) * pull;
          s.y += (player.y - s.y) * pull;
        }
      }
      // Collection
      if (U.dist(s.x, s.y, player.x, player.y) < CFG.SCRAP_RADIUS + player.radius + 10) {
        const pType = s.type || 'scrap';
        this.scraps.splice(i, 1);
        return pType;
      }
      if (s.life <= 0) this.scraps.splice(i, 1);
    }

    // Boost zone spawning
    this.boostZoneTimer -= dt;
    if (this.boostZoneTimer <= 0 && this.phase === 'combat') {
      const angle = U.randFloat(0, Math.PI * 2);
      const dist = U.randFloat(200, 400);
      this.boostZones.push({
        x: U.clamp(player.x + Math.cos(angle) * dist, 60, CFG.WORLD_W - 60),
        y: U.clamp(player.y + Math.sin(angle) * dist, 60, CFG.WORLD_H - 60),
        life: 12, phase: 0,
      });
      this.boostZoneTimer = CFG.BOOST_ZONE_SPAWN_INTERVAL;
    }
    // Update boost zones
    for (let i = this.boostZones.length - 1; i >= 0; i--) {
      const bz = this.boostZones[i];
      bz.life -= dt;
      bz.phase += dt * 3;
      if (U.dist(bz.x, bz.y, player.x, player.y) < CFG.BOOST_ZONE_RADIUS + player.radius) {
        this.boostZones.splice(i, 1);
        return 'boost';
      }
      if (bz.life <= 0) this.boostZones.splice(i, 1);
    }

    return null;
  },

  renderArena(ctx, time) {
    const bgImg = Assets._cache[CFG.BACKGROUND_SPRITE];
    const hasBg = bgImg && bgImg._loaded;

    if (hasBg) {
      // Draw only the visible slice of the background (viewport-clipped)
      const invZoom = 1 / Camera.zoom;
      const vx = Math.max(0, Math.floor(Camera.x - (CFG.W / 2) * invZoom));
      const vy = Math.max(0, Math.floor(Camera.y - (CFG.H / 2) * invZoom));
      const vw = Math.min(Math.ceil(CFG.W * invZoom), CFG.WORLD_W - vx);
      const vh = Math.min(Math.ceil(CFG.H * invZoom), CFG.WORLD_H - vy);
      // Map world coords to image coords (scale image to fill world)
      const sx = vx / CFG.WORLD_W * bgImg.naturalWidth;
      const sy = vy / CFG.WORLD_H * bgImg.naturalHeight;
      const sw = vw / CFG.WORLD_W * bgImg.naturalWidth;
      const sh = vh / CFG.WORLD_H * bgImg.naturalHeight;
      ctx.drawImage(bgImg, sx, sy, sw, sh, vx, vy, vw, vh);
    } else {
      // Fallback: dark fill while image loads or if missing
      ctx.fillStyle = CFG.C_BG;
      ctx.fillRect(Camera.x - CFG.W / 2, Camera.y - CFG.H / 2, CFG.W, CFG.H);
    }

    // Abstract effects only when no background image (designed for dark bg)
    if (!hasBg) {
      const vx = Camera.x - CFG.W / 2;
      const vy = Camera.y - CFG.H / 2;

      // Diagonal scanlines tiled relative to camera
      ctx.strokeStyle = CFG.C_BG2;
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.3;
      const startI = Math.floor((vx - CFG.H) / 20) * 20;
      const endI = vx + CFG.W + CFG.H;
      for (let i = startI; i < endI; i += 20) {
        ctx.beginPath();
        ctx.moveTo(i, vy);
        ctx.lineTo(i + CFG.H, vy + CFG.H);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      // Faint lane fragments
      ctx.fillStyle = CFG.C_BG2;
      ctx.globalAlpha = 0.15;
      const fragOffset = (time * 15) % 80;
      for (let i = 0; i < 8; i++) {
        const fx = vx + 100 + i * 120;
        const fy = vy + ((fragOffset + i * 60) % (CFG.H + 40)) - 20;
        ctx.fillRect(fx, fy, 30, 3);
      }
      ctx.globalAlpha = 1;

      // Dynamic background: slow-moving geometric shapes
      const waveProgress = Math.min(1, (Waves.waveIndex || 1) / 8);
      const bgR = Math.round(20 + waveProgress * 30);
      const bgG = Math.round(30 + (1 - waveProgress) * 20);
      const bgB = Math.round(50 + (1 - waveProgress) * 30);
      ctx.strokeStyle = `rgb(${bgR},${bgG},${bgB})`;
      ctx.globalAlpha = 0.06;
      ctx.lineWidth = 1;
      for (let i = 0; i < 8; i++) {
        const gx = vx + ((time * 8 + i * 371) % (CFG.W + 200)) - 100;
        const gy = vy + ((time * 5 + i * 523) % (CFG.H + 200)) - 100;
        const rot = time * 0.1 + i * 1.3;
        ctx.save();
        ctx.translate(gx, gy);
        ctx.rotate(rot);
        if (i % 3 === 0) {
          ctx.beginPath();
          ctx.moveTo(0, -20); ctx.lineTo(17, 10); ctx.lineTo(-17, 10);
          ctx.closePath(); ctx.stroke();
        } else if (i % 3 === 1) {
          ctx.beginPath();
          ctx.moveTo(0, -15); ctx.lineTo(12, 0); ctx.lineTo(0, 15); ctx.lineTo(-12, 0);
          ctx.closePath(); ctx.stroke();
        } else {
          ctx.beginPath();
          for (let j = 0; j < 6; j++) {
            const a = Math.PI / 3 * j;
            const hx = Math.cos(a) * 14, hy = Math.sin(a) * 14;
            if (j === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
          }
          ctx.closePath(); ctx.stroke();
        }
        ctx.restore();
      }
      ctx.globalAlpha = 1;

      // Dust motes (camera-relative)
      ctx.fillStyle = CFG.C_PANEL;
      ctx.globalAlpha = 0.2;
      for (let i = 0; i < 6; i++) {
        const mx = vx + ((time * 20 + i * 173) % CFG.W);
        const my = vy + ((time * 12 + i * 247) % CFG.H);
        ctx.beginPath();
        ctx.arc(mx, my, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // World boundary line (always drawn)
    ctx.strokeStyle = CFG.C_PANEL;
    ctx.lineWidth = 2;
    ctx.strokeRect(CFG.ARENA_PAD, CFG.ARENA_PAD, CFG.WORLD_W - CFG.ARENA_PAD*2, CFG.WORLD_H - CFG.ARENA_PAD*2);

    // Vignette is rendered in screen space (after applyPost)
  },

  renderEnemies(ctx, time) {
    for (const e of this.enemies) e.render(ctx, time);
  },

  renderScraps(ctx) {
    for (const s of this.scraps) {
      const bob = Math.sin(s.bobPhase) * 3;
      const pType = s.type || 'scrap';
      ctx.save();
      ctx.translate(s.x, s.y + bob);

      const colors = {
        scrap: CFG.C_PICKUP,
        speed_pickup: CFG.C_ACCENT,
        trail_boost: CFG.C_RARE,
        bomb: '#FF4444',
      };
      const color = colors[pType] || CFG.C_PICKUP;
      ctx.fillStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = pType === 'bomb' ? 14 : 8;

      if (pType === 'bomb') {
        // Circle with X
        ctx.beginPath();
        ctx.arc(0, 0, CFG.SCRAP_RADIUS + 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(-3, -3); ctx.lineTo(3, 3);
        ctx.moveTo(3, -3); ctx.lineTo(-3, 3);
        ctx.stroke();
      } else if (pType === 'speed_pickup') {
        // Lightning bolt shape
        ctx.beginPath();
        ctx.moveTo(-3, -8); ctx.lineTo(2, -2); ctx.lineTo(-1, -2);
        ctx.lineTo(3, 8); ctx.lineTo(-2, 2); ctx.lineTo(1, 2);
        ctx.closePath();
        ctx.fill();
      } else if (pType === 'trail_boost') {
        // Diamond
        ctx.beginPath();
        ctx.moveTo(0, -8); ctx.lineTo(6, 0); ctx.lineTo(0, 8); ctx.lineTo(-6, 0);
        ctx.closePath();
        ctx.fill();
      } else {
        // Default hex shape
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = Math.PI / 3 * i - Math.PI / 6;
          const px = Math.cos(a) * CFG.SCRAP_RADIUS;
          const py = Math.sin(a) * CFG.SCRAP_RADIUS;
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
      }
      ctx.shadowBlur = 0;
      ctx.restore();
    }
  },

  renderBoostZones(ctx) {
    for (const bz of this.boostZones) {
      ctx.save();
      ctx.translate(bz.x, bz.y);
      const pulse = 0.6 + 0.3 * Math.sin(bz.phase);
      ctx.globalAlpha = pulse * Math.min(1, bz.life / 2);
      ctx.fillStyle = CFG.C_ACCENT;
      ctx.shadowColor = CFG.C_ACCENT;
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.arc(0, 0, CFG.BOOST_ZONE_RADIUS, 0, Math.PI * 2);
      ctx.fill();
      // Inner chevron
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff';
      ctx.globalAlpha *= 0.7;
      ctx.beginPath();
      ctx.moveTo(-6, 5); ctx.lineTo(0, -7); ctx.lineTo(6, 5);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  },
};

// ── 12. HUD / UI ────────────────────────────────────────────
function renderHUD(ctx, game) {
  const { score, player, waveTimer, waveIndex, driftCombo, phase, breakTimer, highScore, newBest } = game;

  // Sandbox label
  if (game.sandbox) {
    U.text(ctx, 'SANDBOX', CFG.W/2, S(24), { align: 'center', color: CFG.C_ACCENT, size: 18, bold: true, shadow: true });
    U.text(ctx, 'Just drive. No enemies. Press P to pause, ESC to menu.', CFG.W/2, S(44), { align: 'center', color: '#555', size: 11 });
    return;
  }

  // Score (top-left)
  const scoreStr = Math.floor(score).toLocaleString();
  U.text(ctx, 'SCORE', S(20), S(22), { color: '#888', size: 12, bold: true });
  U.text(ctx, scoreStr, S(20), S(42), { color: newBest ? CFG.C_PICKUP : CFG.C_TEXT, size: 22, bold: true, shadow: true });
  if (newBest) {
    U.text(ctx, 'NEW BEST!', S(20), S(60), { color: CFG.C_PICKUP, size: 10, bold: true });
  }

  // Wave timer (top-center)
  if (phase === 'combat') {
    const frac = U.clamp(waveTimer / (Waves.currentCombatDuration || CFG.WAVE_COMBAT), 0, 1);
    const barW = S(200), barH = S(8);
    const bx = CFG.W/2 - barW/2, by = S(14);
    ctx.fillStyle = CFG.C_PANEL;
    ctx.fillRect(bx, by, barW, barH);
    ctx.fillStyle = CFG.C_ACCENT;
    ctx.fillRect(bx, by, barW * frac, barH);
    U.text(ctx, `WAVE ${waveIndex}`, CFG.W/2, by + barH + S(14), { align: 'center', color: '#666', size: 11 });
  }

  // Drift combo (bottom-left)
  if (player.drifting || player.comboLevel > 0.5) {
    const comboInt = Math.floor(player.comboLevel);
    const barW = S(120), barH = S(6);
    const bx = S(20), by = CFG.H - S(30);
    ctx.fillStyle = CFG.C_PANEL;
    ctx.fillRect(bx, by, barW, barH);
    const comboPct = U.clamp(player.driftTime % CFG.DRIFT_COMBO_INTERVAL / CFG.DRIFT_COMBO_INTERVAL, 0, 1);
    ctx.fillStyle = CFG.C_ACCENT;
    ctx.fillRect(bx, by, barW * comboPct, barH);
    U.text(ctx, `DRIFT x${comboInt}`, bx, by - S(8), { color: CFG.C_ACCENT, size: 13, bold: true });
  }

  // Drift available pulse
  if (player.speed >= CFG.DRIFT_THRESHOLD && !player.drifting) {
    const pulse = 0.4 + 0.3 * Math.sin(game.time * 6);
    ctx.globalAlpha = pulse;
    U.text(ctx, 'SPACE TO DRIFT', CFG.W/2, CFG.H - S(20), { align: 'center', color: CFG.C_ACCENT, size: 11 });
    ctx.globalAlpha = 1;
  }

  // Enemy count (top-right area, below upgrades)
  if (phase === 'combat') {
    const aliveCount = Waves.enemies.filter(e => e.alive).length;
    U.text(ctx, `ENEMIES: ${aliveCount}`, CFG.W - S(20), S(46), { align: 'right', color: '#666', size: 11 });
  }

  // Speed indicator bar (bottom-right)
  {
    const barW = S(60), barH = S(4);
    const bx = CFG.W - S(20) - barW, by = CFG.H - S(34);
    const speedFrac = U.clamp(player.speed / (player.maxSpeed || CFG.MAX_SPEED), 0, 1);
    const driftFrac = CFG.DRIFT_THRESHOLD / (player.maxSpeed || CFG.MAX_SPEED);
    ctx.fillStyle = CFG.C_PANEL;
    ctx.fillRect(bx, by, barW, barH);
    ctx.fillStyle = speedFrac >= driftFrac ? CFG.C_ACCENT : '#555';
    ctx.fillRect(bx, by, barW * speedFrac, barH);
    // Drift threshold marker
    ctx.fillStyle = '#888';
    ctx.fillRect(bx + barW * driftFrac - S(1), by - S(1), S(2), barH + S(2));
    U.text(ctx, 'SPD', bx - S(6), by + S(2), { align: 'right', color: '#555', size: 9 });
  }

  // Controls hint (bottom-right)
  U.text(ctx, 'WASD + SPACE', CFG.W - S(20), CFG.H - S(20), { align: 'right', color: '#444', size: 10 });

  // Upgrades taken
  const ups = player.upgrades;
  if (ups.length > 0) {
    for (let i = 0; i < ups.length; i++) {
      const upg = ARENA_UPGRADES.find(u => u.id === ups[i]);
      if (upg) {
        ctx.fillStyle = CFG.C_PANEL;
        ctx.fillRect(CFG.W - S(26) - i * S(22), S(14), S(20), S(20));
        U.text(ctx, upg.icon, CFG.W - S(16) - i * S(22), S(24), { align: 'center', color: CFG.C_ACCENT, size: 12, bold: true });
      }
    }
  }

  // Shield indicator
  if (player.shield) {
    U.text(ctx, 'SHIELD', CFG.W - S(20), S(50), { align: 'right', color: CFG.C_SHIELD, size: 11, bold: true });
  }
}

function renderUpgradeBreak(ctx, cards, breakTimer, selectedIndex) {
  // Dim
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, CFG.W, CFG.H);

  U.text(ctx, 'CHOOSE UPGRADE', CFG.W/2, S(60), { align: 'center', color: CFG.C_ACCENT, size: 28, bold: true, shadow: true });

  // Timer
  const secs = Math.ceil(breakTimer);
  U.text(ctx, `${secs}s`, CFG.W/2, S(90), { align: 'center', color: '#888', size: 16 });

  // Cards
  const cardW = S(180), cardH = S(200), gap = S(20);
  const total = cards.length * cardW + (cards.length - 1) * gap;
  let cx = (CFG.W - total) / 2;

  for (let i = 0; i < cards.length; i++) {
    const card = cards[i];
    const y = S(120);

    // Slide-up animation (staggered)
    const slideOffset = Math.max(0, S(24) - breakTimer * S(120) + i * S(7));

    ctx.save();
    ctx.translate(0, slideOffset);
    ctx.globalAlpha = Math.min(1, breakTimer * 5 - i * 0.3);

    // Card bg
    ctx.fillStyle = selectedIndex === i ? '#2A3344' : CFG.C_PANEL;
    U.roundRect(ctx, cx, y, cardW, cardH, S(8));
    ctx.fill();

    // Border
    ctx.strokeStyle = selectedIndex === i ? CFG.C_ACCENT : '#444';
    ctx.lineWidth = selectedIndex === i ? S(3) : S(1.5);
    U.roundRect(ctx, cx, y, cardW, cardH, S(8));
    ctx.stroke();

    // Key hint
    U.text(ctx, `[${i + 1}]`, cx + cardW/2, y + S(20), { align: 'center', color: CFG.C_ACCENT, size: 14, bold: true });

    // Icon
    U.text(ctx, card.icon, cx + cardW/2, y + S(55), { align: 'center', color: CFG.C_TEXT, size: 36, bold: true });

    // Name
    U.text(ctx, card.name, cx + cardW/2, y + S(90), { align: 'center', color: CFG.C_TEXT, size: 14, bold: true });

    // Desc
    ctx.textBaseline = 'top';
    U.wrapText(ctx, card.desc, cx + S(12), y + S(110), cardW - S(24), S(16), { size: 12, color: '#aaa' });

    ctx.globalAlpha = 1;
    ctx.restore();

    cx += cardW + gap;
  }

  U.text(ctx, 'Press 1 / 2 / 3 to choose', CFG.W/2, CFG.H - S(40), { align: 'center', color: '#666', size: 13 });
}
