<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OVERSTEER</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
canvas {
  display: block;
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  image-rendering: pixelated;
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
<script src="logic.js"></script>
<script src="audio.js"></script>
<script src="fx.js"></script>
<script src="input.js"></script>
<script src="physics.js"></script>
<script src="entities.js"></script>
<script src="world.js"></script>
<script src="waves.js"></script>
<script src="game.js"></script>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ── BOOTSTRAP ───────────────────────────────────────────
(function() {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const { CFG } = window.OversteerLogic;
  canvas.width = CFG.W;
  canvas.height = CFG.H;

  function resize() {
    const scaleX = window.innerWidth / CFG.W;
    const scaleY = window.innerHeight / CFG.H;
    const scale = Math.min(scaleX, scaleY);
    canvas.style.width = (CFG.W * scale) + 'px';
    canvas.style.height = (CFG.H * scale) + 'px';
  }
  window.addEventListener('resize', resize);
  resize();

  Audio.init();
  FXCache.init();
  Game.init();

  let lastTime = performance.now();
  function loop(timestamp) {
    if (Game._resetTiming) {
      lastTime = timestamp;
      Game._resetTiming = false;
    }
    const rawDtMs = timestamp - lastTime;
    const rawDt = Math.min(rawDtMs / 1000, 0.05);
    lastTime = timestamp;
    PerfMon.record(rawDtMs);

    Game.update(rawDt);

    ctx.clearRect(0, 0, CFG.W, CFG.H);
    Game.render(ctx);

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
